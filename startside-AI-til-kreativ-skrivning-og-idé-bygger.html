<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnAI — AI som kreativ medskaber</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep:   #061a0f;
      --green-glow:   #1a6638;
      --green-accent: #4ade80;
      --text:         #f0fdf4;
      --text-soft:    rgba(240,253,244,0.72);
      --text-muted:   rgba(240,253,244,0.45);
    }
    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--green-deep);
      color: var(--text);
      overflow-x: hidden;
    }
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
    }
    .blob-1 {
      width: 650px; height: 650px;
      background: radial-gradient(circle, #1a6638 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: blobFloat 9s ease-in-out infinite;
    }
    .blob-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #0d4a22 0%, transparent 70%);
      top: -80px; right: -40px;
      opacity: 0.5;
    }
    .blob-3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #052e16 0%, transparent 70%);
      bottom: 40px; left: -60px;
      opacity: 0.6;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translate(-50%, -50%) scale(1) translateY(0); }
      50%       { transform: translate(-50%, -50%) scale(1.07) translateY(-20px); }
    }
    .grid-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .landing {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
    }
    .nav-mark {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--green-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(34,197,94,0.3);
    }
    .nav-mark svg { width: 15px; height: 15px; fill: white; }
    .nav-pill {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-accent);
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      padding: 5px 14px;
      border-radius: 999px;
    }
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 24px 80px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--green-glow), #145228);
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
      box-shadow:
        0 0 0 1px rgba(74,222,128,0.25),
        0 0 40px rgba(26,102,56,0.6),
        0 0 80px rgba(26,102,56,0.3);
    }
    .eyebrow {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .title {
      font-family: 'Lora', serif;
      font-size: clamp(30px, 5.5vw, 52px);
      font-weight: 600;
      line-height: 1.15;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }
    .title em {
      font-style: italic;
      color: var(--green-accent);
    }
    .subtitle {
      font-size: clamp(14px, 2vw, 16px);
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 520px;
    }
    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.95);
      color: var(--green-deep);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 30px;
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .start-btn:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .start-btn svg {
      width: 15px; height: 15px;
      flex-shrink: 0;
      fill: none;
      stroke: var(--green-deep);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @media (max-width: 480px) {
      .top-nav { padding: 16px 20px; }
      .badge { width: 54px; height: 54px; font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="grid-overlay"></div>
<div class="landing">
  <nav class="top-nav">
    <a href="https://magnuscode-ai.github.io/ai-kursus/platform.html" class="nav-logo">
      <div class="nav-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H6Z"/></svg>
      </div>
      LearnAI DK
    </a>
    <div class="nav-pill">Sidekursus &nbsp;·&nbsp; Kreativ skrivning</div>
  </nav>
  <main class="center">
    <div class="badge">M1</div>
    <p class="eyebrow">Sidekursus · Del 1 af 3</p>
    <h1 class="title">
      AI som kreativ<br>
      <em>medskaber</em>
    </h1>
    <p class="subtitle">
      Forstå hvad AI er god til — og hvad den ikke kan erstatte.<br>
      Lær tre teknikker der knækker writers block og giver dig bedre idéer på 2 minutter.
    </p>
    <a href="https://magnuscode-ai.github.io/ai-kursus/kursus-AI-til-kreativ-skrivning-og-id%C3%A9-bygger.html" class="start-btn">
      Begynd kurset
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </main>
</div>
</body>
</html>
