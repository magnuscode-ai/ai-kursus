<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnAI.dk</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  z-index: 1000;
}

nav h2 {
  color: #00eaff;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: white;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  height: 150vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.logo {
  width: 260px;
  transition: transform 0.2s ease-out;
  filter: drop-shadow(0 0 40px #00eaff);
}

/* TEXT */
.title {
  font-size: 4rem;
  margin-top: 30px;
  opacity: 0;
  transform: translateY(50px);
}

.subtitle {
  margin-top: 15px;
  color: #aaa;
  opacity: 0;
  transform: translateY(50px);
}

/* SECTIONS */
.section {
  min-height: 100vh;
  padding: 120px 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.text-block {
  max-width: 500px;
  opacity: 0;
  transform: translateY(80px);
}

.big {
  font-size: 2.5rem;
  margin-bottom: 20px;
}

.card {
  padding: 40px;
  border: 1px solid #00eaff33;
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #00eaff55;
}

/* REVEAL */
.reveal.active {
  opacity: 1;
  transform: translateY(0);
  transition: 1s ease;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 50px;
  color: #777;
}
</style>
</head>

<body>

<nav>
  <h2>LearnAI</h2>
  <div>
    <a href="#">Kurser</a>
    <a href="#">Om</a>
    <a href="#">Kontakt</a>
  </div>
</nav>

<section class="hero">
  <img src="logo.png" class="logo" id="logo">
  <h1 class="title reveal">LearnAI.dk</h1>
  <p class="subtitle reveal">AI kurser • praksis • fremtid</p>
</section>

<section class="section">
  <div class="text-block reveal">
    <div class="big">Lær AI på den rigtige måde</div>
    <p>Hands-on kurser der faktisk gør dig klar til fremtiden.</p>
  </div>

  <div class="card reveal">
    🚀 Start din AI rejse
  </div>
</section>

<section class="section">
  <div class="card reveal">
    ⚡ Byg rigtige projekter
  </div>

  <div class="text-block reveal">
    <div class="big">Ikke bare teori</div>
    <p>Du bygger rigtige ting mens du lærer.</p>
  </div>
</section>

<footer>
  © LearnAI.dk
</footer>

<script>
// SCROLL REVEAL
function reveal() {
  const reveals = document.querySelectorAll(".reveal");

  for (let i = 0; i < reveals.length; i++) {
    const windowHeight = window.innerHeight;
    const elementTop = reveals[i].getBoundingClientRect().top;
    const elementVisible = 100;

    if (elementTop < windowHeight - elementVisible) {
      reveals[i].classList.add("active");
    }
  }
}

window.addEventListener("scroll", reveal);

// PARALLAX LOGO
const logo = document.getElementById("logo");

window.addEventListener("scroll", () => {
  let scroll = window.scrollY;
  logo.style.transform = "translateY(" + scroll * 0.3 + "px)";
});

// INITIAL LOAD
reveal();
</script>

</body>
</html>
