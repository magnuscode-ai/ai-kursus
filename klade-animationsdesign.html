<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnAI.dk</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      color: white;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* LOGO */
    .logo {
      width: 300px;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px #00eaff);
    }

    /* GLOW BACKGROUND */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,234,255,0.2), transparent);
      animation: pulse 3s infinite;
    }

    /* TEXT */
    h1 {
      margin-top: 20px;
      font-size: 2.5rem;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 0.5s;
    }

    p {
      margin-top: 10px;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1s;
      color: #aaa;
    }

    /* BUTTON */
    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      border: 1px solid #00eaff;
      color: #00eaff;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00eaff;
      color: black;
      box-shadow: 0 0 20px #00eaff;
    }

    /* ANIMATIONS */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.5; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="glow"></div>

    <!-- SÆT DIT LOGO HER -->
    <img src="logo.png" alt="LearnAI logo" class="logo">

    <h1>LearnAI.dk</h1>
    <p>AI kurser • praksis • fremtid</p>

    <a href="#" class="btn">Kom i gang</a>
  </div>

</body>
</html>
