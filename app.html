<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* SCREENS */
.screen {
  display:none;
  padding:20px;
}

.active {
  display:block;
}

/* CARDS */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.locked {
  opacity:0.4;
}

/* BUTTONS */
button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.green { background:#16a34a; color:white; }
.blue { background:#2563eb; color:white; }
.gray { background:#334155; color:white; }

/* GRID */
.grid {
  display:grid;
  gap:10px;
}

.grid-2 {
  grid-template-columns:1fr 1fr;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #1e293b;
}
</style>

</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div id="coins">💰 0</div>
  <div id="streak">🔥 1</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">
  <h2>Dashboard</h2>

  <div class="card">
    <h3>Start din AI rejse</h3>
    <button class="blue" onclick="openRealCourse('kursus-d.html')">
      Start Kursus D
    </button>
  </div>

  <h3>Sidekurser</h3>
  <div id="courses" class="grid grid-2"></div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <h2>Shop</h2>

  <div class="card">
    <button onclick="buyCoins(10)">10 coins</button>
    <button onclick="buyCoins(50)">50 coins</button>
    <button onclick="buyCoins(100)">100 coins</button>
  </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="goTo('dashboard')">🏠</button>
  <button onclick="goTo('shop')">🛒</button>
</div>

<script>

/* DATA – 12 SIDEKURSER */
let courses = [
  {name:"AI Email", price:40, id:"c1", link:"email-ai.html"},
  {name:"AI Websites", price:50, id:"c2", link:"ai-hjemmesider.html"},
  {name:"AI Code", price:30, id:"c3", link:"ai-kode.html"},
  {name:"AI Video", price:50, id:"c4", link:"ai-video.html"},
  {name:"AI Automation", price:40, id:"c5", link:"ai-automation.html"},
  {name:"AI Teaching", price:30, id:"c6", link:"ai-undervisning.html"},
  {name:"AI Business", price:60, id:"c7", link:"ai-business.html"},
  {name:"AI Marketing", price:50, id:"c8", link:"ai-marketing.html"},
  {name:"AI Tools", price:30, id:"c9", link:"ai-tools.html"},
  {name:"AI School", price:25, id:"c10", link:"ai-school.html"},
  {name:"AI Freelance", price:45, id:"c11", link:"ai-freelance.html"},
  {name:"AI Advanced", price:80, id:"c12", link:"ai-advanced.html"}
];

/* NAVIGATION */
function goTo(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

/* OPEN REAL COURSE */
function openRealCourse(url) {
  window.location.href = url;
}

/* COINS SYSTEM */
function getCoins() {
  return parseInt(localStorage.getItem("coins")) || 0;
}

function setCoins(c) {
  localStorage.setItem("coins", c);
}

function addCoins(amount) {
  let c = getCoins();
  c += amount;
  setCoins(c);
  updateUI();
}

/* SHOP */
function buyCoins(amount) {
  addCoins(amount);
  alert("Du købte " + amount + " coins");
}

/* BUY COURSE */
function buyCourse(course) {
  let coins = getCoins();

  if (coins >= course.price) {
    coins -= course.price;
    setCoins(coins);
    localStorage.setItem(course.id, "owned");
    updateUI();
  } else {
    alert("Ikke nok coins");
  }
}

/* OPEN SIDE COURSE */
function openCourse(course) {
  window.location.href = course.link;
}

/* UI */
function updateUI() {
  let coins = getCoins();
  document.getElementById("coins").innerText = "💰 " + coins;

  let html = "";

  courses.forEach(c => {
    let owned = localStorage.getItem(c.id) === "owned";

    if (owned) {
      html += `
      <div class="card">
        <b>${c.name}</b><br>
        <button class="green" onclick='openCourse(${JSON.stringify(c)})'>
          Start
        </button>
      </div>`;
    } else {
      html += `
      <div class="card locked">
        <b>${c.name}</b><br>
        🔒 ${c.price} coins<br>
        <button onclick='buyCourse(${JSON.stringify(c)})'>
          Køb
        </button>
      </div>`;
    }
  });

  document.getElementById("courses").innerHTML = html;
}

/* STREAK SYSTEM */
function checkStreak() {
  let today = new Date().toDateString();
  let last = localStorage.getItem("lastLogin");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (last !== today) {
    let y = new Date();
    y.setDate(y.getDate() - 1);

    if (last === y.toDateString()) {
      streak++;
      addCoins(5);
    } else {
      streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastLogin", today);
  }

  document.getElementById("streak").innerText = "🔥 " + streak;
}

/* INIT */
checkStreak();
updateUI();

</script>

</body>
</html>
