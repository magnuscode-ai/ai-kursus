<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Eksamen 1 | Bronze | LearnAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bronze: #cd7f32;
            --bronze-light: #f5e6d3;
            --bronze-dark: #8b5a2b;
            --bg: #1a1a2e;
            --card: #ffffff;
            --text: #2c2c44;
            --muted: #6c6c8a;
            --success: #2e7d32;
            --error: #c62828;
            --correct: #e8f5e9;
            --wrong: #ffebee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .exam-container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 3px solid var(--bronze);
            position: relative;
            overflow: hidden;
        }

        /* Bronze glow */
        .exam-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(205, 127, 50, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .exam-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .exam-badge {
            display: inline-block;
            background: linear-gradient(135deg, #cd7f32, #b8860b);
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.4);
        }

        .exam-header h1 {
            font-size: 2rem;
            color: var(--bronze-dark);
            margin-bottom: 0.3rem;
        }

        .exam-header p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #cd7f32, #b8860b);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .question-counter {
            text-align: center;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .question-card {
            background: #fafbff;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e8e8f0;
        }

        .question-card h3 {
            color: var(--text);
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .option:hover {
            border-color: var(--bronze);
            background: var(--bronze-light);
        }

        .option.selected {
            border-color: #1976d2;
            background: #e3f2fd;
            font-weight: 600;
        }

        .option.correct {
            border-color: var(--success);
            background: var(--correct);
            color: var(--success);
        }

        .option.wrong {
            border-color: var(--error);
            background: var(--wrong);
            color: var(--error);
        }

        .option input[type="radio"] {
            accent-color: var(--bronze);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #555;
        }

        .btn-prev:hover {
            background: #ccc;
        }

        .btn-next {
            background: linear-gradient(135deg, #cd7f32, #b8860b);
            color: white;
            box-shadow: 0 6px 18px rgba(205, 127, 50, 0.35);
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(205, 127, 50, 0.5);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            box-shadow: 0 6px 18px rgba(46, 125, 50, 0.35);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Resultat overlay */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .result-overlay.show {
            display: flex;
        }

        .result-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .result-card h2 {
            margin-bottom: 0.8rem;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 900;
            margin: 1rem 0;
        }

        .passed {
            color: #2e7d32;
        }
        .failed {
            color: #c62828;
        }

        .btn-retry {
            background: linear-gradient(135deg, #cd7f32, #b8860b);
            color: white;
            padding: 0.9rem 2.5rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
            box-shadow: 0 6px 18px rgba(205, 127, 50, 0.35);
        }

        .btn-continue {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            padding: 0.9rem 2.5rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
            box-shadow: 0 6px 18px rgba(46, 125, 50, 0.35);
        }

        @media (max-width: 600px) {
            .exam-container {
                padding: 1.5rem;
                border-radius: 1.5rem;
            }
            .exam-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="exam-container" id="examContainer">
        <!-- Header -->
        <div class="exam-header">
            <span class="exam-badge"><i class="fas fa-medal"></i> BRONZE</span>
            <h1>Eksamen B1</h1>
            <p>Teoretisk prøve · 12 spørgsmål · Skal have 11/12 rigtige for at bestå</p>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <div class="question-counter" id="questionCounter">Spørgsmål 1 af 12</div>

        <!-- Spørgsmål -->
        <div class="question-card" id="questionCard">
            <h3 id="questionText"></h3>
            <div class="options" id="optionsContainer"></div>
        </div>

        <!-- Knapper -->
        <div class="btn-group">
            <button class="btn btn-prev" id="btnPrev" onclick="prevQuestion()" disabled>
                <i class="fas fa-arrow-left"></i> Forrige
            </button>
            <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">
                Næste <i class="fas fa-arrow-right"></i>
            </button>
            <button class="btn btn-submit" id="btnSubmit" onclick="submitExam()" style="display: none;">
                <i class="fas fa-check-circle"></i> Afslut eksamen
            </button>
        </div>
    </div>

    <!-- Resultat overlay -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card" id="resultCard"></div>
    </div>

    <script>
        // ==================== SPØRGSMÅL (Baseret på kursus B indhold) ====================
        const questions = [
            {
                q: "Hvad er det primære formål med prompt engineering?",
                options: [
                    "At skrive så korte prompts som muligt",
                    "At designe præcise instruktioner, der får AI til at give de ønskede outputs",
                    "At programmere AI-modeller fra bunden",
                    "At oversætte tekst mellem sprog"
                ],
                correct: 1
            },
            {
                q: "Hvilken teknik bruger man, når man giver AI'en et eksempel på det ønskede output først?",
                options: [
                    "Zero-shot prompting",
                    "Chain-of-thought prompting",
                    "Few-shot prompting",
                    "Negative prompting"
                ],
                correct: 2
            },
            {
                q: "Hvad er chain-of-thought (CoT) prompting?",
                options: [
                    "At bede AI'en om at svare uden forklaring",
                    "At bede AI'en om at tænke trin-for-trin og vise sin ræsonnering",
                    "At give AI'en en kæde af links",
                    "At skrive prompts i en bestemt rækkefølge"
                ],
                correct: 1
            },
            {
                q: "Hvad er en 'hallucination' i AI-sammenhæng?",
                options: [
                    "Når AI'en bliver træt og lukker ned",
                    "Når AI'en genererer fakta, der lyder rigtige, men som er forkerte eller opdigtede",
                    "Når AI'en ser billeder, der ikke findes",
                    "Når brugeren forestiller sig ting"
                ],
                correct: 1
            },
            {
                q: "Hvilken af følgende er en bedste praksis for prompt engineering?",
                options: [
                    "Bruge så få ord som overhovedet muligt",
                    "Være specifik, give kontekst og definere det ønskede format",
                    "Aldrig stille opfølgende spørgsmål",
                    "Kun bruge ét ord ad gangen"
                ],
                correct: 1
            },
            {
                q: "Hvad betyder 'temperature' i forbindelse med AI-modeller?",
                options: [
                    "Hvor varm computeren bliver under brug",
                    "Hvor kreativ eller forudsigelig modellens output er – højere temperatur = mere kreativt",
                    "Hvor hurtigt modellen svarer",
                    "Hvor mange brugere der er på samtidigt"
                ],
                correct: 1
            },
            {
                q: "Hvad er formålet med en 'system prompt'?",
                options: [
                    "At tænde og slukke for AI'en",
                    "At sætte rammerne og reglerne for, hvordan AI'en skal opføre sig i samtalen",
                    "At opdatere softwaren",
                    "At logge brugerens aktivitet"
                ],
                correct: 1
            },
            {
                q: "Hvad er RAG (Retrieval-Augmented Generation)?",
                options: [
                    "En metode til at tegne billeder",
                    "En teknik der kombinerer informationssøgning med tekstgenerering for mere præcise svar",
                    "Et spil om AI",
                    "En type hardware til AI"
                ],
                correct: 1
            },
            {
                q: "Hvorfor er det vigtigt at faktatjekke AI-genereret indhold?",
                options: [
                    "Fordi AI altid lyver",
                    "Fordi AI kan hallucinere og generere overbevisende, men forkert information",
                    "Fordi det er lovpligtigt i alle lande",
                    "Fordi AI ikke kan læse tekst"
                ],
                correct: 1
            },
            {
                q: "Hvad er en 'token' i AI-sammenhæng?",
                options: [
                    "En sikkerhedsnøgle til login",
                    "En enhed af tekst (ord eller dele af ord), som AI-modellen behandler",
                    "Et point man optjener ved brug",
                    "En type filformat"
                ],
                correct: 1
            },
            {
                q: "Hvilken rolle spiller 'context window' for en AI-model?",
                options: [
                    "Det er vinduet på computerens skærm",
                    "Det er mængden af tekst (tokens) som AI'en kan 'huske' og forholde sig til i én samtale",
                    "Det er et sikkerhedsvindue",
                    "Det er tidsrummet hvor AI'en er tilgængelig"
                ],
                correct: 1
            },
            {
                q: "Hvad er forskellen på supervised og unsupervised learning?",
                options: [
                    "Der er ingen forskel",
                    "Supervised bruger mærkede data med facit, unsupervised finder selv mønstre i umærkede data",
                    "Supervised er hurtigere end unsupervised",
                    "Unsupervised kræver mere strøm"
                ],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let examSubmitted = false;

        // DOM elementer
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const questionCounter = document.getElementById('questionCounter');
        const progressFill = document.getElementById('progressFill');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnSubmit = document.getElementById('btnSubmit');
        const resultOverlay = document.getElementById('resultOverlay');
        const resultCard = document.getElementById('resultCard');

        function loadQuestion(index) {
            if (examSubmitted) return;
            
            const q = questions[index];
            questionText.textContent = q.q;
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, i) => {
                const label = document.createElement('label');
                label.className = 'option';
                if (answers[index] === i) label.classList.add('selected');

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'question';
                radio.value = i;
                radio.checked = (answers[index] === i);
                radio.addEventListener('change', () => selectAnswer(index, i, label));

                const span = document.createElement('span');
                span.textContent = opt;

                label.appendChild(radio);
                label.appendChild(span);
                optionsContainer.appendChild(label);
            });

            questionCounter.textContent = `Spørgsmål ${index + 1} af ${questions.length}`;
            progressFill.style.width = ((index + 1) / questions.length) * 100 + '%';

            // Knapper
            btnPrev.disabled = (index === 0);
            if (index === questions.length - 1) {
                btnNext.style.display = 'none';
                btnSubmit.style.display = 'inline-block';
            } else {
                btnNext.style.display = 'inline-block';
                btnSubmit.style.display = 'none';
            }
        }

        function selectAnswer(questionIndex, answerIndex, labelElement) {
            if (examSubmitted) return;
            
            answers[questionIndex] = answerIndex;

            // Fjern selected fra alle option labels i dette spørgsmål
            const allOptions = optionsContainer.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            labelElement.classList.add('selected');
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
            }
        }

        function submitExam() {
            if (examSubmitted) return;
            
            // Tjek om alle spørgsmål er besvaret
            const unanswered = answers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`Du har ${unanswered} ubesvarede spørgsmål. Besvar alle før du afslutter.`);
                return;
            }

            examSubmitted = true;

            // Beregn score
            let correctCount = 0;
            answers.forEach((ans, i) => {
                if (ans === questions[i].correct) correctCount++;
            });

            const passed = correctCount >= 11;
            const percentage = Math.round((correctCount / questions.length) * 100);

            // Vis resultater på spørgsmålene
            showCorrectAnswers();

            // Vis resultat overlay
            resultCard.innerHTML = `
                <div class="result-icon">${passed ? '🏆' : '😔'}</div>
                <h2>${passed ? 'Tillykke! Du bestod!' : 'Desværre - ikke bestået'}</h2>
                <p>Du skal have mindst 11 ud af 12 rigtige for at bestå.</p>
                <div class="result-score ${passed ? 'passed' : 'failed'}">${correctCount} / 12</div>
                <p style="color: var(--muted);">${percentage}% rigtige</p>
                ${passed ? `
                    <p style="margin-top: 0.5rem; color: var(--success); font-weight: 600;">
                        <i class="fas fa-unlock"></i> Du kan nu gå videre til Eksamen B2 (Sølv)
                    </p>
                    <p style="margin-top: 0.5rem; color: var(--bronze-dark);">
                        <i class="fas fa-medal"></i> Bronze badge optjent! 🥉
                    </p>
                    <button class="btn-continue" onclick="window.location.href='eksamen-b2.html'">
                        <i class="fas fa-arrow-right"></i> Fortsæt til Eksamen B2
                    </button>
                ` : `
                    <button class="btn-retry" onclick="retryExam()">
                        <i class="fas fa-redo"></i> Prøv igen
                    </button>
                `}
            `;
            resultOverlay.classList.add('show');

            // Deaktiver alle radio buttons
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
            btnPrev.disabled = true;
            btnNext.disabled = true;
            btnSubmit.disabled = true;
        }

        function showCorrectAnswers() {
            const allOptionLabels = optionsContainer.querySelectorAll('.option');
            const correctIndex = questions[currentQuestion].correct;
            const userAnswer = answers[currentQuestion];

            allOptionLabels.forEach((label, i) => {
                if (i === correctIndex) {
                    label.classList.add('correct');
                }
                if (i === userAnswer && userAnswer !== correctIndex) {
                    label.classList.add('wrong');
                }
            });
        }

        function retryExam() {
            examSubmitted = false;
            answers = new Array(questions.length).fill(null);
            currentQuestion = 0;
            resultOverlay.classList.remove('show');
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = false);
            btnPrev.disabled = false;
            btnNext.disabled = false;
            btnSubmit.disabled = false;
            loadQuestion(0);
        }

        // Start
        loadQuestion(0);
    </script>
</body>
</html>
