<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksamen B1 | Bronze | LearnAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bronze-primary: #cd7f32;
            --bronze-dark: #8b5a2b;
            --bronze-light: #faf0e6;
            --bronze-gradient: linear-gradient(135deg, #cd7f32 0%, #a0522d 50%, #8b4513 100%);
            --bg-dark: #1a1a2e;
            --card-bg: #ffffff;
            --text-primary: #1a1a2e;
            --text-muted: #6b7280;
            --success: #059669;
            --error: #dc2626;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Bronze atmosfære baggrund */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 15% 50%, rgba(205,127,50,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 25%, rgba(160,82,45,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 85%, rgba(139,69,19,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(205,127,50,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: bronzeShimmer 20s ease-in-out infinite;
        }

        @keyframes bronzeShimmer {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .exam-wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            width: 100%;
        }

        /* === TOP BAR === */
        .exam-topbar {
            background: var(--card-bg);
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 1.5rem 2rem;
            border: 2px solid var(--bronze-primary);
            border-bottom: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: linear-gradient(to bottom, #fffdf7, #ffffff);
        }

        .badge-bronze {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--bronze-gradient);
            color: white;
            padding: 0.6rem 1.8rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(205, 127, 50, 0.45);
            animation: badgeGlow 3s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 6px 20px rgba(205, 127, 50, 0.45); }
            50% { box-shadow: 0 6px 30px rgba(205, 127, 50, 0.7); }
        }

        .badge-bronze i { font-size: 1.1rem; }

        .exam-meta {
            display: flex;
            gap: 1.8rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .exam-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .exam-meta i { color: var(--bronze-primary); font-size: 1rem; }

        .countdown {
            background: #fef3c7;
            color: #92400e;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 2px solid #fbbf24;
            transition: all 0.3s;
        }

        .countdown.warning {
            background: #fee2e2;
            color: #991b1b;
            border-color: #f87171;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* === HOVED CONTAINER === */
        .exam-container {
            background: var(--card-bg);
            border-radius: 0 0 1.5rem 1.5rem;
            padding: 2.5rem;
            border: 2px solid var(--bronze-primary);
            border-top: 2px solid var(--bronze-primary);
            box-shadow: var(--shadow-2xl);
        }

        /* === PROGRESS === */
        .progress-section {
            margin-bottom: 2rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        .progress-fill {
            height: 100%;
            background: var(--bronze-gradient);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(205, 127, 50, 0.4);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 30px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
            border-radius: 0 10px 10px 0;
        }

        /* === SPØRGSMÅL === */
        .question-area {
            background: #fafbfc;
            border: 2px solid var(--border);
            border-radius: 1.2rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
            position: relative;
        }

        .question-difficulty {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #1a1a2e;
            color: #fbbf24;
            padding: 0.3rem 1rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .question-number {
            display: inline-block;
            background: var(--bronze-light);
            color: var(--bronze-dark);
            padding: 0.4rem 1.2rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(205, 127, 50, 0.3);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            line-height: 1.8;
            letter-spacing: -0.1px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.1rem 1.3rem;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
        }

        .option-item:hover {
            border-color: var(--bronze-primary);
            background: #fdf8f3;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(205, 127, 50, 0.1);
        }

        .option-item.selected {
            border-color: #2563eb;
            background: #eff6ff;
            font-weight: 600;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .option-item input[type="radio"] {
            accent-color: var(--bronze-primary);
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-item label {
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f3f4f6;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .option-item.selected .option-letter {
            background: #2563eb;
            color: white;
        }

        /* === NAVIGATION === */
        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .question-dots {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0.5rem 0;
        }

        .question-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .question-dot:hover { 
            border-color: var(--bronze-primary); 
            transform: scale(1.1);
        }
        .question-dot.active { 
            background: var(--bronze-primary); 
            color: white; 
            border-color: var(--bronze-primary);
            box-shadow: 0 0 0 4px rgba(205, 127, 50, 0.2);
        }
        .question-dot.answered { 
            background: var(--bronze-light); 
            border-color: var(--bronze-primary); 
            color: var(--bronze-dark);
        }
        .question-dot.answered::after {
            content: '●';
            position: absolute;
            top: -4px;
            right: -4px;
            font-size: 0.6rem;
            color: var(--bronze-primary);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2.2rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.5s;
            transform: translate(-50%, -50%);
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-outline {
            background: white;
            border: 2px solid #d1d5db;
            color: var(--text-primary);
        }

        .btn-outline:hover:not(:disabled) { 
            border-color: var(--bronze-primary); 
            background: #fdf8f3; 
        }
        .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: var(--bronze-gradient);
            color: white;
            box-shadow: 0 6px 20px rgba(205, 127, 50, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(205, 127, 50, 0.55);
        }

        .btn-submit {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.4);
            display: none;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.55);
        }

        .warning-text {
            color: #f59e0b;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* === RESULT OVERLAY === */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        .overlay.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-modal {
            background: white;
            border-radius: 2rem;
            padding: 3rem;
            max-width: 580px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid var(--bronze-primary);
        }

        @keyframes slideUp { 
            from { transform: translateY(40px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .result-icon { font-size: 5rem; margin-bottom: 1rem; }
        .result-score { font-size: 4rem; font-weight: 900; margin: 0.5rem 0; letter-spacing: -2px; }
        .score-pass { color: #059669; }
        .score-fail { color: #dc2626; }

        .result-detail { 
            color: var(--text-muted); 
            margin: 1rem 0; 
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .certificate-preview {
            background: linear-gradient(135deg, #fdf8f3, #faf0e6);
            border: 2px solid var(--bronze-primary);
            border-radius: 1rem;
            padding: 1.2rem;
            margin: 1.5rem 0;
            text-align: left;
        }

        .certificate-preview h4 {
            color: var(--bronze-dark);
            margin-bottom: 0.5rem;
        }

        .btn-retry {
            background: var(--bronze-gradient);
            color: white;
            padding: 0.9rem 2.5rem;
            border-radius: 2.5rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            box-shadow: 0 6px 20px rgba(205, 127, 50, 0.4);
        }

        .btn-next-level {
            background: linear-gradient(135deg, #b8b8b8, #7a7a7a);
            color: white;
            padding: 0.9rem 2.5rem;
            border-radius: 2.5rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(168, 168, 168, 0.4);
        }

        .btn-next-level:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 168, 168, 0.6);
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .exam-container { padding: 1.5rem; }
            .exam-topbar { padding: 1rem 1.5rem; }
            .question-text { font-size: 1rem; }
            .nav-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .question-dot { width: 30px; height: 30px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="exam-wrapper">
        <!-- ==================== TOP BAR ==================== -->
        <div class="exam-topbar">
            <span class="badge-bronze"><i class="fas fa-medal"></i> Bronze Certificering</span>
            <div class="exam-meta">
                <span><i class="fas fa-question-circle"></i> 15 spørgsmål</span>
                <span><i class="fas fa-check-circle"></i> 12/15 for bestået</span>
                <span><i class="fas fa-star"></i> Ekspert-niveau</span>
                <span class="countdown" id="countdown">
                    <i class="fas fa-hourglass-half"></i> <span id="timer">50:00</span>
                </span>
            </div>
        </div>

        <!-- ==================== EKSAMENS CONTAINER ==================== -->
        <div class="exam-container" id="examContainer">
            <!-- Progress -->
            <div class="progress-section">
                <div class="progress-info">
                    <span id="progressText">Spørgsmål 1 af 15</span>
                    <span id="answeredCount">0 besvaret</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Spørgsmål -->
            <div class="question-area">
                <div class="question-difficulty" id="difficultyBadge">
                    <i class="fas fa-brain"></i> <span id="difficultyText">HØJ</span>
                </div>
                <span class="question-number" id="questionNumber">Spørgsmål 1</span>
                <div class="question-text" id="questionText"></div>
                <div class="options-list" id="optionsContainer"></div>
            </div>

            <!-- Navigation dots -->
            <div class="nav-section">
                <div class="question-dots" id="questionDots"></div>
                
                <!-- Knapper -->
                <div class="nav-buttons">
                    <button class="btn btn-outline" id="btnPrev" onclick="navigateQuestion(-1)" disabled>
                        <i class="fas fa-arrow-left"></i> Forrige
                    </button>
                    <span class="warning-text">
                        <i class="fas fa-exclamation-triangle"></i> Én indsendelse tilladt
                    </span>
                    <button class="btn btn-primary" id="btnNext" onclick="navigateQuestion(1)">
                        Næste <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="btn btn-submit" id="btnSubmit" onclick="submitExam()">
                        <i class="fas fa-check-double"></i> Indsend eksamen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== RESULTAT OVERLAY ==================== -->
    <div class="overlay" id="resultOverlay">
        <div class="result-modal" id="resultModal"></div>
    </div>

    <script>
        // ==================== 15 EKSTREMT SVÆRE SPØRGSMÅL ====================
        const questions = [
            {
                id: 1,
                difficulty: "HØJ",
                question: "En virksomhed implementerer et RAG-system med en vector database til at besvare spørgsmål fra 200.000 interne dokumenter. Systemet returnerer ofte irrelevante resultater. Efter grundig fejlfinding identificerer du, at chunking-strategien er problemet. Hvilken chunking-strategi vil med STØRST sandsynlighed løse problemet og hvorfor?",
                options: [
                    "A) Fast chunk size på 512 tokens med 0% overlap – det er den mest standardiserede tilgang og garanterer ensartede chunks",
                    "B) Semantisk chunking med overlap på 20%, hvor chunks opdeles ved naturlige afsnit og bevarer kontekst. Dette sikrer at relateret information forbliver samlet, og overlap forhindrer tab af information ved chunk-grænser. Der suppleres med metadata om dokumenttitel, sektion og dato for hver chunk",
                    "C) Reducér chunk size til 128 tokens for at få flere granulære resultater – flere chunks betyder flere relevante matches",
                    "D) Brug én gigantisk chunk på 100.000 tokens per dokument for at undgå opdeling helt"
                ],
                correct: 1
            },
            {
                id: 2,
                difficulty: "EKSTREM",
                question: "Du designer en multi-agent AI-arkitektur til automatisering af en kompleks forretningsproces der involverer: dataindsamling, analyse, rapportgenerering og kvalitetskontrol. Systemet skal håndtere edge cases uden menneskelig indblanding. Hvilken arkitektur er MEST robust, og hvilken fejlhåndteringsmekanisme er kritisk?",
                options: [
                    "A) En enkelt monolitisk agent der håndterer alle trin sekventielt med try-catch omkring hele processen",
                    "B) En orchestra-multi-agent arkitektur med specialiserede agenter: DataAgent → AnalyseAgent → RapportAgent → KvalitetsAgent. Hver agent har en refleksions-loop (generér → evaluér → forbedr). En Supervisor-agent overvåger og omdirigerer ved fejl. Kritisk mekanisme: circuit-breaker pattern der forhindrer kaskaderende fejl, kombineret med dead-letter queue til fejlbehæftede tasks",
                    "C) Parallelle agenter der alle forsøger at løse opgaven, og den bedste løsning vælges ved afstemning",
                    "D) En enkelt agent med en meget lang og detaljeret system prompt der dækker alle tænkelige scenarier"
                ],
                correct: 1
            },
            {
                id: 3,
                difficulty: "HØJ",
                question: "I en produktionssætning opdager du, at din LLM-baserede applikation af og til returnerer komplet forkerte svar med høj 'confidence'. Du har allerede sat temperature=0. Hvilken kombination af teknikker vil MEST effektivt reducere hallucinationer uden at ofre brugbarheden?",
                options: [
                    "A) Sænk temperature yderligere til negative værdier og håb på det bedste",
                    "B) Implementér en tre-lags strategi: (1) RAG med citation-krav hvor hvert claim skal have en kildehenvisning, (2) en separat 'fact-checker' agent der verificerer output mod kildematerialet, (3) confidence calibration hvor modellen eksplicit skal angive usikkerhed på en skala 1-5 for hvert faktapåstand. Outputs med lav confidence flagges til menneskelig gennemgang",
                    "C) Tilføj 'Vær 100% korrekt' til alle prompts – det løser problemet",
                    "D) Brug kun pre-genererede svar fra en database og undgå AI-generering helt"
                ],
                correct: 1
            },
            {
                id: 4,
                difficulty: "EKSTREM",
                question: "Du træner en brugerdefineret model via fine-tuning til at generere medicinske rapporter. Efter 3 episoders træning opdager du, at modellen performer fremragende på træningsdata, men forfærdeligt på valideringsdata. Du har brugt 10.000 eksempler. Hvad er den MEST sandsynlige årsag og den bedste løsning?",
                options: [
                    "A) Modellen har brug for flere træningsepoker – øg til 50 episoder for bedre konvergens",
                    "B) Overfitting – modellen har memoriseret træningsdata i stedet for at lære generaliserbare mønstre. Løsning: (1) reducér learning rate med faktor 10, (2) implementér early stopping baseret på valideringstab, (3) tilføj dropout (0.1-0.2) og weight decay, (4) brug data augmentation til at øge datasættets diversitet, (5) evalúer med cross-validation (k=5)",
                    "C) Modellen er underfittet og har brug for flere parametre – opgradér til en større model",
                    "D"): "Fjern valideringsdatasættet – hvis modellen kun evalueres på træningsdata, er problemet løst"
                ],
                correct: 1
            },
            {
                id: 5,
                difficulty: "HØJ",
                question: "Du designer en prompt til at evaluere 500 jobansøgninger for bias. Prompten skal identificere kønsmæssig, etnisk og aldersmæssig bias i ansættelsesprocessen. Hvilken prompting-strategi er MEST etisk forsvarlig og metodisk robust?",
                options: [
                    "A) Bed AI'en om at 'finde alle biased beslutninger' uden yderligere specifikation",

                options: [

        // ==================== STATE MANAGEMENT ====================
        let currentIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let examSubmitted = false;
        let timeLeft = 50 * 60; // 50 minutter
        let timerInterval;
        let questionStartTime;
        let questionTimeLog = [];

        // ==================== DOM REFERENCES ====================
        const questionText = document.getElementById('questionText');
        const questionNumber = document.getElementById('questionNumber');
        const difficultyText = document.getElementById('difficultyText');
        const difficultyBadge = document.getElementById('difficultyBadge');
        const optionsContainer = document.getElementById('optionsContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const answeredCount = document.getElementById('answeredCount');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnSubmit = document.getElementById('btnSubmit');
        const questionDots = document.getElementById('questionDots');
        const resultOverlay = document.getElementById('resultOverlay');
        const resultModal = document.getElementById('resultModal');
        const timerDisplay = document.getElementById('timer');
        const countdownEl = document.getElementById('countdown');

        // ==================== TIMER ====================
        function startTimer() {
            questionStartTime = Date.now();
            timerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 600) {
                    countdownEl.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('⏰ Tiden er gået! Din eksamen indsendes automatisk.');
                    submitExam(true);
                }
            }, 1000);
        }

        function logQuestionTime() {
            if (questionStartTime) {
                const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
                questionTimeLog[currentIndex] = (questionTimeLog[currentIndex] || 0) + timeSpent;
            }
            questionStartTime = Date.now();
        }

        // ==================== RENDER ====================
        function renderQuestion(index) {
            if (examSubmitted) return;
            
            logQuestionTime();
            
            const q = questions[index];
            questionNumber.textContent = `Spørgsmål ${index + 1}`;
            questionText.textContent = q.question;
            difficultyText.textContent = q.difficulty;
            
            // Farve efter sværhedsgrad
            if (q.difficulty === 'EKSTREM') {
                difficultyBadge.style.background = '#7f1d1d';
                difficultyBadge.style.color = '#fca5a5';
            } else {
                difficultyBadge.style.background = '#1a1a2e';
                difficultyBadge.style.color = '#fbbf24';
            }
            
            optionsContainer.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            
            q.options.forEach((opt, i) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option-item';
                if (userAnswers[index] === i) optionDiv.classList.add('selected');
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question_${index}`;
                radio.id = `option_${index}_${i}`;
                radio.value = i;
                radio.checked = (userAnswers[index] === i);
                
                const letterSpan = document.createElement('span');
                letterSpan.className = 'option-letter';
                letterSpan.textContent = letters[i];
                
                const label = document.createElement('label');
                label.htmlFor = `option_${index}_${i}`;
                label.textContent = opt.substring(3); // Fjern "A) " prefix
                
                optionDiv.appendChild(radio);
                optionDiv.appendChild(letterSpan);
                optionDiv.appendChild(label);
                
                optionDiv.addEventListener('click', (e) => {
                    if (e.target !== radio) {
                        radio.checked = true;
                        selectAnswer(index, i);
                    }
                });
                
                optionsContainer.appendChild(optionDiv);
            });

            // Progress
            progressText.textContent = `Spørgsmål ${index + 1} af ${questions.length}`;
            progressFill.style.width = ((index + 1) / questions.length * 100) + '%';
            
            const answeredTotal = userAnswers.filter(a => a !== null).length;
            answeredCount.textContent = `${answeredTotal} besvaret (${questions.length - answeredTotal} mangler)`;
            
            // Knapper
            btnPrev.disabled = (index === 0);
            
            if (index === questions.length - 1) {
                btnNext.style.display = 'none';
                btnSubmit.style.display = 'inline-flex';
            } else {
                btnNext.style.display = 'inline-flex';
                btnSubmit.style.display = 'none';
            }
            
            renderDots();
            
            // Scroll til toppen af spørgsmålet
            document.querySelector('.question-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderDots() {
            questionDots.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('button');
                dot.className = 'question-dot';
                if (i === currentIndex) dot.classList.add('active');
                if (userAnswers[i] !== null) dot.classList.add('answered');
                dot.textContent = i + 1;
                dot.title = `Gå til spørgsmål ${i + 1}${userAnswers[i] !== null ? ' (besvaret)' : ' (ikke besvaret)'}`;
                dot.addEventListener('click', () => {
                    logQuestionTime();
                    currentIndex = i;
                    renderQuestion(i);
                });
                questionDots.appendChild(dot);
            });
        }

        function selectAnswer(questionIndex, answerIndex) {
            if (examSubmitted) return;
            userAnswers[questionIndex] = answerIndex;
            renderQuestion(questionIndex);
        }

        function navigateQuestion(direction) {
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < questions.length) {
                logQuestionTime();
                currentIndex = newIndex;
                renderQuestion(currentIndex);
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (examSubmitted) return;
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                navigateQuestion(-1);
            } else if (e.key === 'ArrowRight' && currentIndex < questions.length - 1) {
                navigateQuestion(1);
            } else if (e.key >= '1' && e.key <= '4') {
                const optionIndex = parseInt(e.key) - 1;
                selectAnswer(currentIndex, optionIndex);
            }
        });

        // ==================== SUBMIT ====================
        function submitExam(isAutoSubmit = false) {
            if (examSubmitted) return;
            
            logQuestionTime();
            
            const unanswered = userAnswers.filter(a => a === null).length;
            
            if (!isAutoSubmit && unanswered > 0) {
                const bekræft = confirm(
                    `⚠️ ADVARSEL: Du har ${unanswered} ubesvarede spørgsmål!\n\n` +
                    `Ubesvarede spørgsmål tæller som FORKERTE og kan ikke ændres efter indsendelse.\n\n` +
                    `Er du HELT sikker på, at du vil indsende nu?`
                );
                if (!bekræft) return;
            }
            
            examSubmitted = true;
            clearInterval(timerInterval);
            
            let correctCount = 0;
            const questionResults = [];
            
            userAnswers.forEach((ans, i) => {
                const isCorrect = ans === questions[i].correct;
                if (isCorrect) correctCount++;
                questionResults.push({
                    number: i + 1,
                    userAnswer: ans,
                    correctAnswer: questions[i].correct,
                    isCorrect: isCorrect,
                    timeSpent: questionTimeLog[i] || 0
                });
            });
            
            const passed = correctCount >= 12;
            const percentage = Math.round((correctCount / questions.length) * 100);
            const grade = correctCount >= 14 ? 'A+' : correctCount >= 13 ? 'A' : correctCount >= 12 ? 'B' : 'F';
            
            // Deaktiver alt
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
            document.querySelectorAll('.option-item').forEach(o => o.style.pointerEvents = 'none');
            btnPrev.disabled = true;
            btnNext.disabled = true;
            btnSubmit.disabled = true;
            document.querySelectorAll('.question-dot').forEach(d => d.style.pointerEvents = 'none');
            
            // Vis resultater per spørgsmål
            const resultSummary = questionResults.map(r => 
                `${r.isCorrect ? '✅' : '❌'} Q${r.number}: ${r.isCorrect ? 'Korrekt' : 'Forkert'} (${r.timeSpent}s)`
            ).join('<br>');
            
            // Byg resultat modal
            resultModal.innerHTML = `
                <div class="result-icon">${passed ? '🏆' : '📚'}</div>
                <h2 style="color: var(--text-primary); margin-bottom: 0.3rem;">
                    ${passed ? 'TILLYKKE! Du bestod!' : 'Desværre - ikke bestået'}
                </h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">
                    ${passed ? 'Bronze-certificering opnået' : 'Du skal øve dig mere'}
                </p>
                <div class="result-score ${passed ? 'score-pass' : 'score-fail'}">${correctCount} / 15</div>
                <p style="font-size: 1.2rem; font-weight: 700; color: ${passed ? '#059669' : '#dc2626'};">
                    ${percentage}% • Karakter: ${grade}
                </p>
                <p style="color: var(--text-muted); margin: 0.3rem 0;">
                    ${passed 
                        ? '✓ Minimum 12/15 opnået' 
                        : `✗ Du mangler ${12 - correctCount} rigtige for at bestå`}
                </p>
                
                ${passed ? `
                    <div class="certificate-preview">
                        <h4><i class="fas fa-certificate"></i> Certificeringsdetaljer</h4>
                        <p style="font-size: 0.9rem; color: var(--bronze-dark);">
                            <strong>Niveau:</strong> B1 Bronze<br>
                            <strong>Score:</strong> ${correctCount}/15 (${percentage}%)<br>
                            <strong>Karakter:</strong> ${grade}<br>
                            <strong>Dato:</strong> ${new Date().toLocaleDateString('da-DK', { year: 'numeric', month: 'long', day: 'numeric' })}<br>
                            <strong>Status:</strong> Bestået ✅
                        </p>
                    </div>
                    <a href="eksamen-b2.html" class="btn-next-level">
                        <i class="fas fa-arrow-right"></i> Fortsæt til Eksamen B2 (Sølv)
                    </a>
                ` : `
                    <div style="background: #fef2f2; border: 2px solid #dc2626; border-radius: 1rem; padding: 1rem; margin: 1rem 0; text-align: left; font-size: 0.85rem; color: #991b1b; max-height: 200px; overflow-y: auto;">
                        <strong>Detaljerede resultater:</strong><br><br>
                        ${resultSummary}
                    </div>
                    <button class="btn-retry" onclick="retryExam()">
                        <i class="fas fa-redo"></i> Prøv igen
                    </button>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.8rem;">
                        💡 <strong>Tip:</strong> Gennemgå hele kursus B materialet igen. 
                        Fokuser særligt på: prompt engineering, RAG, fine-tuning, bias-håndtering og enterprise AI-arkitektur.
                    </p>
                `}
            `;
            
            resultOverlay.classList.add('active');
        }

        function retryExam() {
            examSubmitted = false;
            userAnswers = new Array(questions.length).fill(null);
            currentIndex = 0;
            timeLeft = 50 * 60;
            questionTimeLog = [];
            countdownEl.classList.remove('warning');
            resultOverlay.classList.remove('active');
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = false);
            document.querySelectorAll('.option-item').forEach(o => o.style.pointerEvents = 'auto');
            document.querySelectorAll('.question-dot').forEach(d => d.style.pointerEvents = 'auto');
            btnPrev.disabled = false;
            btnNext.disabled = false;
            btnSubmit.disabled = false;
            renderQuestion(0);
            startTimer();
        }

        // ==================== INIT ====================
        renderQuestion(0);
        startTimer();

        // Luk overlay ved ESC eller klik udenfor (kun hvis ikke bestået)
        resultOverlay.addEventListener('click', function(e) {
            if (e.target === this && !examSubmitted) {
                this.classList.remove('active');
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !examSubmitted) {
                resultOverlay.classList.remove('active');
            }
        });

        // Advarsel ved forsøg på at forlade siden
        window.addEventListener('beforeunload', (e) => {
            if (!examSubmitted && userAnswers.some(a => a !== null)) {
                e.preventDefault();
                e.returnValue = 'Du har ubesvarede spørgsmål. Er du sikker på, at du vil forlade eksamen?';
                return e.returnValue;
            }
        });

        console.log('🥉 Eksamen B1 (Bronze) klar - 15 svære spørgsmål');
        console.log('📋 Krav: 12/15 for at bestå');
        console.log('⏱️  Tid: 50 minutter');
        console.log('💡 Keyboard shortcuts: ← → for navigation, 1-4 for at vælge svar');
    </script>
