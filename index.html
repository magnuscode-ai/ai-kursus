<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Kursus D – Eksamen</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.card:hover {
  background:#334155;
}

.correct { background:green !important; }
.wrong { background:red !important; }

button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

#finishBtn {
  display:none;
  background:#16a34a;
  color:white;
}
</style>
</head>

<body>

<h1>Kursus D – Eksamen</h1>

<div id="quiz"></div>

<button id="finishBtn" onclick="finishExam()">Afslut eksamen</button>

<script>

/* SPØRGSMÅL */
let questions = [
  {
    q: "Hvad er AI?",
    answers: [
      "Computer der tænker som mennesker",
      "Programmer der genkender mønstre",
      "Internet forbindelse",
      "Robotter"
    ],
    correct: 1
  },
  {
    q: "Hvad bruges AI til?",
    answers: [
      "Lave mad",
      "Løse opgaver automatisk",
      "Kun spil",
      "Kun robotter"
    ],
    correct: 1
  },
  {
    q: "Hvad er ChatGPT?",
    answers: [
      "En bil",
      "En AI chatbot",
      "En app store",
      "En robot"
    ],
    correct: 1
  },
  {
    q: "Hvad er data?",
    answers: [
      "Information",
      "Mad",
      "Videoer",
      "Billeder kun"
    ],
    correct: 0
  },
  {
    q: "AI lærer fra?",
    answers: [
      "Gæt",
      "Data",
      "Mennesker direkte",
      "Ingenting"
    ],
    correct: 1
  },
  {
    q: "Machine learning er?",
    answers: [
      "Maskiner der lærer",
      "Robotter",
      "Apps",
      "Spil"
    ],
    correct: 0
  },
  {
    q: "AI kan hjælpe med?",
    answers: [
      "Emails",
      "Kode",
      "Idéer",
      "Alle ovenstående"
    ],
    correct: 3
  },
  {
    q: "Hvad er en prompt?",
    answers: [
      "En kommando til AI",
      "En app",
      "Et spil",
      "En fil"
    ],
    correct: 0
  },
  {
    q: "AI kan være?",
    answers: [
      "Klog",
      "Dum",
      "Begge dele",
      "Ingen"
    ],
    correct: 2
  },
  {
    q: "AI fremtid?",
    answers: [
      "Vokser",
      "Forsvinder",
      "Stopper",
      "Ingen idé"
    ],
    correct: 0
  }
];

let score = 0;
let answered = 0;

/* LOAD QUIZ */
function loadQuiz() {
  let html = "";

  questions.forEach((q, i) => {
    html += `<h3>${i+1}. ${q.q}</h3>`;

    q.answers.forEach((a, index) => {
      html += `
      <div class="card" onclick="answer(${i}, ${index}, this)">
        ${a}
      </div>`;
    });
  });

  document.getElementById("quiz").innerHTML = html;
}

/* ANSWER */
function answer(qIndex, aIndex, el) {

  let question = questions[qIndex];

  // stop dobbelt svar
  if (el.parentElement.classList.contains("answered")) return;

  el.parentElement.classList.add("answered");

  let cards = el.parentElement.querySelectorAll(".card");

  cards.forEach((card, i) => {
    if (i === question.correct) card.classList.add("correct");
    else card.classList.add("wrong");
  });

  if (aIndex === question.correct) {
    score++;
  }

  answered++;

  // vis knap når færdig
  if (answered === questions.length) {
    document.getElementById("finishBtn").style.display = "block";
  }
}

/* FINISH */
function finishExam() {

  let total = questions.length;
  let required = Math.ceil(total * 0.7);

  if (score < required) {
    alert("Du bestod ikke (" + score + "/" + total + "). Prøv igen.");
    location.reload();
    return;
  }

  // Anti cheat
  if (localStorage.getItem("d_exam_done") === "true") {
    alert("Du har allerede gennemført");
    window.location.href = "app.html";
    return;
  }

  // Coins
  let coins = parseInt(localStorage.getItem("coins")) || 0;
  coins += 25;
  localStorage.setItem("coins", coins);

  localStorage.setItem("d_exam_done", "true");

  alert("Tillykke! Du bestod (" + score + "/" + total + ") og fik 25 coins 🎉");

  window.location.href = "app.html";
}

loadQuiz();

</script>

</body>
</html>
