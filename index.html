<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Kursus D – Eksamen</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

h1 {
  margin-bottom:20px;
}

.answer {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin:8px 0;
  cursor:pointer;
}

.answer:hover {
  background:#334155;
}

.correct {
  background:green !important;
}

.wrong {
  background:red !important;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:20px;
  background:#16a34a;
  color:white;
  cursor:pointer;
}

#finishBtn {
  display:none;
}
</style>
</head>

<body>

<h1>Kursus D – Eksamen</h1>

<div id="quiz"></div>

<button id="finishBtn" onclick="completeExam()">Afslut eksamen</button>

<script>

// DATA
let questions = [
  {
    q: "Hvad er kunstig intelligens (AI)?",
    answers: [
      "Computer der kan tænke ligesom mennesker",
      "Computerprogrammer trænet til at løse opgaver ved at genkende mønstre",
      "En ny type internet-forbindelse",
      "Robotter der kan bevæge sig rundt"
    ],
    correct: 1
  },
  {
    q: "Hvad bruges AI til?",
    answers: [
      "Lave mad",
      "Løse opgaver automatisk",
      "Kun spil",
      "Kun robotter"
    ],
    correct: 1
  },
  {
    q: "Hvad er ChatGPT?",
    answers: [
      "En bil",
      "En AI chatbot",
      "En app store",
      "En robot"
    ],
    correct: 1
  }
];

// VARIABLER
let score = 0;
let answeredQuestions = 0;
let totalQuestions = questions.length;

// LOAD QUIZ
function loadQuiz() {
  let html = "";

  questions.forEach((q, i) => {
    html += `<h3>${i+1}. ${q.q}</h3>`;

    q.answers.forEach((a, index) => {
      html += `
      <div class="answer" onclick="answer(${i}, ${index}, this)">
        ${a}
      </div>`;
    });
  });

  document.getElementById("quiz").innerHTML = html;
}

// SVAR
function answer(qIndex, aIndex, el) {

  let question = questions[qIndex];

  // stop dobbelt klik
  if (el.parentElement.classList.contains("answered")) return;

  el.parentElement.classList.add("answered");

  let answers = el.parentElement.querySelectorAll(".answer");

  answers.forEach((a, i) => {
    if (i === question.correct) {
      a.classList.add("correct");
    } else {
      a.classList.add("wrong");
    }
  });

  if (aIndex === question.correct) {
    score++;
  }

  answeredQuestions++;

  // vis afslut knap når alle er besvaret
  if (answeredQuestions === totalQuestions) {
    document.getElementById("finishBtn").style.display = "block";
  }
}

// AFSLUT EKSAMEN
function completeExam() {

  // sikkerhed
  if (answeredQuestions < totalQuestions) {
    alert("Du skal svare på alle spørgsmål!");
    return;
  }

  let requiredCorrect = Math.ceil(totalQuestions * 0.7);

  // ikke bestået
  if (score < requiredCorrect) {
    alert("Du bestod ikke (" + score + "/" + totalQuestions + "). Prøv igen.");
    location.reload();
    return;
  }

  // anti cheat
  if (localStorage.getItem("d_exam_done") === "true") {
    alert("Du har allerede gennemført eksamen");
    window.location.href = "app.html";
    return;
  }

  // giv coins
  let coins = parseInt(localStorage.getItem("coins")) || 0;
  coins += 25;
  localStorage.setItem("coins", coins);

  localStorage.setItem("d_exam_done", "true");

  alert("Tillykke! Du bestod (" + score + "/" + totalQuestions + ") og fik 25 coins 🎉");

  window.location.href = "app.html";
}

// START
loadQuiz();

</script>

</body>
</html>
