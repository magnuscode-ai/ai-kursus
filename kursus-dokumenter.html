<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnAI DK — Sidekurset Dokumenter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Farvevariabler ─────────────────────────────────── */
    :root {
      --blue: #185FA5;
      --green: #0F6E56;
      --orange: #C45000;
      --orange-light: #FFF0E6;
      --yellow-bg: #FFF3CD;
      --yellow-txt: #856404;
      --purple: #5B2A86;
      --purple-light: #EFE5FA;
      --purple-dark: #46206a;
      --red: #B42318;
      --red-light: #FEE4E2;
      --grey: #F5F5F5;
      --border: #E2E8F0;
      --bg: #F4F7FB;
      --white: #FFFFFF;
      --text: #1A1A1A;
      --muted: #6B7280;
      --gold: #B8860B;
      --radius: 14px;
      --radius-lg: 18px;
      --shadow: 0 4px 24px rgba(91,42,134,0.10);
      --shadow-lg: 0 10px 40px rgba(91,42,134,0.18);

      /* Program-farvegradienter — fra lys til mørk */
      /* Excel: grøn — lysegrøn → mørkegrøn */
      --excel-1: #6BBF8E;   /* M1: lysegrøn */
      --excel-2: #2D9C5F;   /* Quiz: medium grøn */
      --excel-3: #157346;   /* M2: mørkegrøn */
      --excel-4: #0A4B2C;   /* Eksamen: meget mørkegrøn */

      /* Word: blå — lyseblå → mørkeblå */
      --word-1: #6BA5D6;    /* M1: lyseblå */
      --word-2: #2E7DC2;    /* Quiz: medium blå */
      --word-3: #185FA5;    /* M2: mørkeblå */
      --word-4: #0D3D6B;    /* Eksamen: meget mørkeblå */

      /* PowerPoint: rød — lyserød → mørkerød */
      --ppt-1: #E89595;     /* M1: lyserød */
      --ppt-2: #D45D5D;     /* Quiz: medium rød */
      --ppt-3: #B42318;     /* M2: mørkerød */
      --ppt-4: #7A1812;     /* Eksamen: meget mørkerød */

      /* Slides: gul/orange — lysegul → mørkegul */
      --slides-1: #F2D068;  /* M1: lysegul */
      --slides-2: #E5A832;  /* Quiz: medium gul */
      --slides-3: #C77E10;  /* M2: mørkegul */
      --slides-4: #8C5707;  /* Eksamen: meget mørkegul */

      /* Originale farver til "lidt af hvert" */
      --excel-orig: #0F6E56;
      --word-orig: #185FA5;
      --ppt-orig: #B42318;
      --slides-orig: #C77E10;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Navigation ──────────────────────────────────────── */
    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-size: 16px; font-weight: 700;
      color: var(--text); text-decoration: none;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--blue); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 15px; height: 15px; fill: white; }
    .nav-tag {
      font-size: 13px; color: var(--muted);
      background: var(--grey); padding: 5px 12px; border-radius: 20px;
      font-weight: 500;
    }

    /* ── Topbar progress ────────────────────────────────── */
    .topbar {
      display: none;
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      position: sticky; top: 56px; z-index: 90;
    }
    .topbar.show { display: block; }
    .topbar-inner { max-width: 1100px; margin: 0 auto; }
    .topbar-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted); margin-bottom: 6px;
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .topbar-track {
      height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .topbar-fill {
      height: 100%; background: var(--purple); border-radius: 99px;
      transition: width 0.5s ease, background 0.4s ease;
    }
    .steps-bar {
      max-width: 1100px; margin: 0.75rem auto 0;
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin;
    }
    .steps-bar::-webkit-scrollbar { height: 4px; }
    .steps-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .step-item { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      background: var(--grey); color: var(--muted);
      border: 2px solid var(--border);
      transition: all 0.3s;
    }
    .step-dot.done { background: var(--green); color: white; border-color: var(--green); }
    .step-dot.active { color: white; box-shadow: 0 0 0 4px rgba(91,42,134,0.18); }
    .step-label { font-size: 11px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .step-label.done { color: var(--green); }
    .step-label.active { color: var(--text); font-weight: 700; }
    .step-arrow { color: var(--border); font-size: 14px; flex-shrink: 0; }

    /* ── Container & states ─────────────────────────────── */
    .container { max-width: 880px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .state { display: none; }
    .state.active { display: block; animation: fadeIn 0.45s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero (dynamisk farve via inline style) ──────────── */
    .hero {
      color: white;
      border-radius: var(--radius-lg);
      padding: 2.75rem 2rem 2.25rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: white; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 99px;
      margin-bottom: 1rem;
      position: relative;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 38px; font-weight: 400;
      line-height: 1.1; margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
      position: relative;
    }
    .hero p {
      font-size: 16px; opacity: 0.92;
      max-width: 620px; line-height: 1.6;
      margin-bottom: 1.5rem;
      position: relative;
    }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 1.25rem; position: relative; }
    .hero-meta-item {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; opacity: 0.92; font-weight: 500;
    }
    .hero-meta-item span { font-size: 16px; }

    /* ── Info-bokse ──────────────────────────────────────── */
    .info-box {
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
    }
    .info-box-title {
      font-weight: 700; font-size: 13px; margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }
    .info-box p { font-size: 14px; line-height: 1.7; }
    .info-box code {
      background: rgba(0,0,0,0.06);
      padding: 1px 5px; border-radius: 4px;
      font-size: 12.5px; font-family: 'Courier New', monospace;
    }
    .box-blue   { background: #E6F1FB; } .box-blue .info-box-title   { color: var(--blue); }
    .box-green  { background: #E1F5EE; } .box-green .info-box-title  { color: var(--green); }
    .box-yellow { background: var(--yellow-bg); } .box-yellow .info-box-title { color: var(--yellow-txt); }
    .box-grey   { background: var(--grey); } .box-grey .info-box-title { color: #444; }
    .box-orange { background: var(--orange-light); } .box-orange .info-box-title { color: var(--orange); }
    .box-purple { background: var(--purple-light); } .box-purple .info-box-title { color: var(--purple); }
    .box-red    { background: var(--red-light); } .box-red .info-box-title    { color: var(--red); }

    /* ── Knapper ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      padding: 13px 28px; border-radius: 12px;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--purple);
      color: white;
      box-shadow: 0 4px 14px rgba(91,42,134,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--purple-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(91,42,134,0.4);
    }
    .btn-primary:disabled {
      background: var(--border); color: var(--muted);
      cursor: not-allowed; box-shadow: none;
    }
    .btn-secondary {
      background: white; color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--purple); color: var(--purple); }
    .btn-large { padding: 16px 36px; font-size: 16px; }
    .btn-success { background: var(--green); color: white; }
    .btn-success:hover { background: #0a5640; }

    /* ── Intro: navnefelt-formular ──────────────────────── */
    .name-form {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.75rem 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin: 1.5rem 0 1rem;
    }
    .name-form h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; font-weight: 400;
      margin-bottom: 0.35rem;
    }
    .name-form .nf-sub {
      font-size: 14px; color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .nf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
      margin-bottom: 0.85rem;
    }
    .nf-field { display: flex; flex-direction: column; gap: 5px; }
    .nf-field label {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--muted);
    }
    .nf-field input {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 13px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      transition: all 0.15s;
      width: 100%;
    }
    .nf-field input:focus {
      outline: none;
      border-color: var(--purple);
      background: white;
    }
    .nf-field.error input { border-color: var(--red); background: #fff5f4; }
    .nf-error-msg {
      font-size: 12px; color: var(--red);
      margin-top: 4px; display: none;
    }
    .nf-field.error .nf-error-msg { display: block; }

    /* ══════════════════════════════════════════════════════
       VALG-SIDE: stort, animeret og farverigt
       ══════════════════════════════════════════════════════ */
    .valg-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: dropIn 0.6s ease both;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .valg-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 44px; font-weight: 400;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      letter-spacing: -0.6px;
      background: linear-gradient(135deg, #5B2A86 0%, #185FA5 50%, #0F6E56 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .valg-header p {
      font-size: 16px;
      color: var(--muted);
      max-width: 540px;
      margin: 0 auto;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.75rem;
      margin: 1.75rem 0 2rem;
    }
    .choice-card {
      background: white;
      border: 3px solid var(--border);
      border-radius: 22px;
      padding: 2.25rem 1.85rem 2rem;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.36,1.4,.6,1),
                  box-shadow 0.25s,
                  border-color 0.2s;
      position: relative;
      overflow: hidden;
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }
    .choice-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(91,42,134,0.04) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .choice-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(91,42,134,0.15);
      border-color: rgba(91,42,134,0.35);
    }
    .choice-card:hover::before { opacity: 1; }
    .choice-card.selected {
      border-color: var(--purple);
      transform: translateY(-4px);
      box-shadow: 0 0 0 4px rgba(91,42,134,0.15), 0 16px 36px rgba(91,42,134,0.18);
    }
    .choice-card.selected::after {
      content: '✓';
      position: absolute; top: 18px; right: 18px;
      width: 34px; height: 34px;
      background: var(--purple); color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700;
      animation: checkPop 0.35s cubic-bezier(.4,1.6,.6,1) both;
    }
    @keyframes checkPop {
      0%   { transform: scale(0) rotate(-45deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* Animation: kort flyver ind */
    .choice-card.fly-in-left  { animation: flyLeft 0.7s cubic-bezier(.36,1.2,.6,1) both; }
    .choice-card.fly-in-right { animation: flyRight 0.7s cubic-bezier(.36,1.2,.6,1) both; }
    @keyframes flyLeft {
      0%   { opacity: 0; transform: translateX(-120%) rotate(-6deg); }
      60%  { opacity: 1; transform: translateX(8%) rotate(2deg); }
      100% { opacity: 1; transform: translateX(0) rotate(0); }
    }
    @keyframes flyRight {
      0%   { opacity: 0; transform: translateX(120%) rotate(6deg); }
      60%  { opacity: 1; transform: translateX(-8%) rotate(-2deg); }
      100% { opacity: 1; transform: translateX(0) rotate(0); }
    }

    .card-icon-wrap {
      width: 88px; height: 88px;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      position: relative;
    }
    .card-icon-wrap.deep {
      background: linear-gradient(135deg, #f3e8ff 0%, #e0c8f7 100%);
    }
    .card-icon-wrap.all {
      background: linear-gradient(135deg, #fff4d4 0%, #ffe0a3 35%, #c8e6e0 70%, #d8e8ff 100%);
    }
    .card-icon { width: 56px; height: 56px; }

    .choice-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px; font-weight: 400;
      margin-bottom: 0.5rem; color: var(--text);
      line-height: 1.15;
    }
    .choice-desc {
      font-size: 14.5px; color: var(--muted);
      line-height: 1.65; margin-bottom: 1.25rem;
    }
    .choice-time-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(91,42,134,0.08);
      color: var(--purple);
      padding: 5px 11px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .program-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: auto;
    }
    .program-check {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 12px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: all 0.18s;
      font-size: 13.5px; font-weight: 600;
      user-select: none;
    }
    .program-check:hover:not(.disabled) {
      transform: translateY(-1px);
    }
    .program-check[data-prog="excel"]:hover:not(.disabled)  { border-color: var(--excel-orig); background: #e8f5ee; }
    .program-check[data-prog="word"]:hover:not(.disabled)   { border-color: var(--word-orig);  background: #e6f0fa; }
    .program-check[data-prog="ppt"]:hover:not(.disabled)    { border-color: var(--ppt-orig);   background: #fbe7e5; }
    .program-check[data-prog="slides"]:hover:not(.disabled) { border-color: var(--slides-orig); background: #fdf3df; }

    .program-check.checked[data-prog="excel"]  { border-color: var(--excel-orig);  background: #e8f5ee; color: var(--excel-orig); }
    .program-check.checked[data-prog="word"]   { border-color: var(--word-orig);   background: #e6f0fa; color: var(--word-orig); }
    .program-check.checked[data-prog="ppt"]    { border-color: var(--ppt-orig);    background: #fbe7e5; color: var(--ppt-orig); }
    .program-check.checked[data-prog="slides"] { border-color: var(--slides-orig); background: #fdf3df; color: var(--slides-orig); }

    .program-check.disabled { opacity: 0.4; cursor: not-allowed; }
    .program-check .pc-box {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-radius: 5px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: white;
      transition: all 0.15s;
      font-size: 12px; color: white;
    }
    .program-check.checked[data-prog="excel"]  .pc-box { background: var(--excel-orig);  border-color: var(--excel-orig); }
    .program-check.checked[data-prog="word"]   .pc-box { background: var(--word-orig);   border-color: var(--word-orig); }
    .program-check.checked[data-prog="ppt"]    .pc-box { background: var(--ppt-orig);    border-color: var(--ppt-orig); }
    .program-check.checked[data-prog="slides"] .pc-box { background: var(--slides-orig); border-color: var(--slides-orig); }
    .program-check .pc-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .order-row {
      margin-top: 0.85rem;
      display: none; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .order-row.show { display: flex; animation: fadeIn 0.3s ease; }
    .order-row select {
      flex: 1; padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: white; cursor: pointer;
    }
    .pill-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
    .pill-list .pill {
      padding: 6px 13px; border-radius: 99px;
      font-size: 12.5px; font-weight: 700;
    }
    .pill-list .pill.excel  { background: #e8f5ee; color: var(--excel-orig); }
    .pill-list .pill.word   { background: #e6f0fa; color: var(--word-orig); }
    .pill-list .pill.ppt    { background: #fbe7e5; color: var(--ppt-orig); }
    .pill-list .pill.slides { background: #fdf3df; color: var(--slides-orig); }

    .choice-error {
      display: none;
      background: var(--red-light); color: var(--red);
      padding: 9px 13px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      margin-top: 0.65rem;
    }
    .choice-error.show { display: block; animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .start-bar {
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
      padding-top: 1rem;
    }
    .lock-warn { font-size: 13px; color: var(--muted); text-align: center; }

    /* ── Modul-sektion ───────────────────────────────────── */
    .module {
      background: white;
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .module-header {
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .module-header:hover { background: var(--bg); }
    .module-letter {
      width: 36px; height: 36px;
      color: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px; flex-shrink: 0;
    }
    .module-title-wrap { flex: 1; }
    .module-title { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .module-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .module-toggle {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 400;
      transition: transform 0.25s, background 0.2s;
      flex-shrink: 0;
      background: var(--bg); color: var(--text);
    }
    .module.open .module-toggle { transform: rotate(45deg); }
    .module-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
      padding: 0 1.5rem;

      max-height: 12000px;
      padding: 0.25rem 1.5rem 1.75rem;

    /* ── Indhold inde i moduler ──────────────────────────── */

    h3.subhead {
      font-size: 16px; font-weight: 700; color: var(--text);
      margin: 1.25rem 0 0.6rem;
    }

    .code-block {
      background: #1e2a3a; color: #e2f0fb;
      border-radius: 10px; padding: 1rem 1.15rem;
      font-family: 'Courier New', monospace;
      font-size: 13px; line-height: 1.65;
      margin-bottom: 1rem;
      white-space: pre-wrap; overflow-x: auto;
    }
    .code-label {
      display: inline-block;
      background: var(--purple-light); color: var(--purple);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 4px;
      margin-bottom: 0.4rem;
    }

    .practice {
      background: var(--orange-light);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 1.25rem;
      border-left: 3px solid var(--orange);
    }

      font-size: 13px; font-weight: 700;
      color: var(--orange); margin-bottom: 0.5rem;
    }
    .practice ol { padding-left: 1.2rem; }
    .practice li, .practice p {
      font-size: 14px; line-height: 1.7; color: var(--text);
    }
    .practice li { margin-bottom: 4px; }

    .summary {
      border-radius: var(--radius);
      padding: 1.5rem 1.5rem;
      color: white;
      margin: 1.5rem 0 1.25rem;
    }
    .summary h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 19px; font-weight: 400;
      margin-bottom: 0.75rem;
    }
    .summary ul { padding-left: 1.2rem; }
    .summary li {
      font-size: 14px; line-height: 1.75;
      opacity: 0.94; margin-bottom: 4px;
    }

    .next-cta {
      background: white;
      border: 2px solid var(--purple);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: 1.5rem;
    }
    .next-cta-icon { font-size: 36px; margin-bottom: 0.5rem; }
    .next-cta h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; font-weight: 400;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .next-cta p { font-size: 14px; color: var(--muted); margin-bottom: 1.25rem; }
    .next-cta .req {
      display: inline-block;

      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; font-weight: 700;
      margin-bottom: 1rem;

    /* ── Quiz UI ─────────────────────────────────────────── */
    .quiz-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .quiz-header {
      color: white;
      padding: 1.75rem 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .quiz-header::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);

    }
    .quiz-tag {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 99px;
      margin-bottom: 0.5rem;
      position: relative;
    }
    .quiz-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px; font-weight: 400;
      margin-bottom: 0.25rem;
      position: relative;
    }
    .quiz-header p { font-size: 14px; opacity: 0.85; position: relative; }
    .quiz-progress { padding: 1.25rem 2rem 0; }
    .quiz-prog-meta {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--muted);
      margin-bottom: 8px; font-weight: 600;
    }
    .quiz-prog-track {
      height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .quiz-prog-fill {

    }
    .quiz-question-wrap { padding: 1.5rem 2rem 0; }
    .q-number {
      font-size: 11px; font-weight: 700;

    }
    .q-text { font-size: 17px; font-weight: 600; line-height: 1.5; color: var(--text); }
    .quiz-options {
      padding: 1.25rem 2rem 0;

    }
    .option-btn {
      display: flex; align-items: flex-start; gap: 12px;

      border-radius: var(--radius);

      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);

    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }
    .option-letter {
      flex-shrink: 0;
      width: 26px; height: 26px;

    }
    .option-btn.correct {

    }
    .option-btn.wrong {

    .option-btn.wrong .option-letter {

    .quiz-feedback {

    .exam-intro {

    .exam-option.wrong { border-color: var(--red); background: var(--red-light); }
    .exam-option .opt-letter {
      width: 24px; height: 24px;

      <span id="topbar-label">Dit forløb</span>
      <span id="topbar-pct">0%</span>
    </div>

<script>
/* =====================================================================
   GLOBAL STATE
   ===================================================================== */
const courseState = {
  user: { firstName: '', lastName: '', email: '' },
  userChoice: null,
  selectedPrograms: [],
  programOrder: [],
  stateQueue: [],
  currentStateIndex: 0,
  quizScores: {},
  examScores: {},
  startTime: null,
  locked: false
};

const PROGRAM_LABELS = {
  excel:  'Excel',
  word:   'Word',
  ppt:    'PowerPoint',
  slides: 'Google Slides'
};
const PROGRAM_SHORT = { excel: 'XL', word: 'W', ppt: 'PP', slides: 'GS' };

/* Farve-mapping per program-trin (kun deep mode).
   Hvert program har 4 trin: m1 → quiz → m2 → eksamen,
   hver med en gradvist mørkere farve. */
const PROGRAM_COLORS = {
  excel:  { m1: '#6BBF8E', quiz: '#2D9C5F', m2: '#157346', exam: '#0A4B2C' },
  word:   { m1: '#6BA5D6', quiz: '#2E7DC2', m2: '#185FA5', exam: '#0D3D6B' },
  ppt:    { m1: '#E89595', quiz: '#D45D5D', m2: '#B42318', exam: '#7A1812' },
  slides: { m1: '#F2D068', quiz: '#E5A832', m2: '#C77E10', exam: '#8C5707' }
};
const PROGRAM_ORIG = {
  excel:  '#0F6E56',
  word:   '#185FA5',
  ppt:    '#B42318',
  slides: '#C77E10'
};
/* Samlet eksamen i 'lidt af hvert' — multi-farve gradient */
const COMBINED_GRADIENT = 'linear-gradient(120deg, #0F6E56 0%, #185FA5 35%, #B42318 70%, #C77E10 100%)';
const PURPLE = '#5B2A86';

/* Få farve til en state — bruges i hero, header, knapper, badge */
function colorFor(stateName, isLightMode) {
  if (stateName === 'bevis') return PURPLE;
  if (stateName === 'combined_exam') return null; // gradient håndteres separat
  const [prog, kind] = stateName.split('_');
  if (isLightMode) {
    // Lidt-af-hvert: alle moduler bruger originalfarven for programmet
    return PROGRAM_ORIG[prog];
  }
  const map = PROGRAM_COLORS[prog];
  if (!map) return PURPLE;
  if (kind === 'm1') return map.m1;
  if (kind === 'm2') return map.m2;
  if (kind === 'quiz') return map.quiz;
  if (kind === 'exam') return map.exam;
  return PURPLE;
}

function progIcon(id, color) {
  const c = color || PURPLE;
  switch (id) {
    case 'excel':

/* =====================================================================
   QUIZ-SHUFFLER — løser problem 1
   Spørgsmål er skrevet med korrekt svar først (index 0).
   Ved render shuffles svarmulighederne tilfældigt, så det rigtige svar
   havner med ligelig sandsynlighed på A/B/C/D.
   Vi seedet shuffleren per spørgsmål baseret på indhold, så samme
   spørgsmål altid får samme rækkefølge inden for en session — men
   forskellige spørgsmål får forskellig fordeling.
   ===================================================================== */
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}
function seededShuffle(arr, seed) {
  // Fisher-Yates med seeded random
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function prepareQuestion(q, qIndex) {
  // q har: q (text), opts_correct_first (4 svar, korrekt = idx 0), explanation
  const seed = hashStr(q.q) + qIndex * 7919;
  // Lav indeks-array [0,1,2,3] og shuffle dem
  const order = seededShuffle([0,1,2,3], seed);
  const shuffledOpts = order.map(i => q.opts_correct_first[i]);
  const correctIdx = order.indexOf(0); // hvor det oprindelige idx-0 (korrekte) endte
  return {
    q: q.q,
    options: shuffledOpts,
    correct: correctIdx,
    explanation: q.explanation
  };
}

/* =====================================================================
   STATE-KØ-GENERERING
   ===================================================================== */
function generateStateQueue(choice, programs, order) {
  const queue = [];
  if (choice === 'deep') {
    const ordered = (order && order.length === 2) ? order : programs;
    ordered.forEach(p => {
      queue.push(`${p}_m1`);
      queue.push(`${p}_quiz`);
      queue.push(`${p}_m2`);
      queue.push(`${p}_exam`);
    });
    queue.push('bevis');
  } else {
    const all = ['excel', 'word', 'ppt', 'slides'];
    all.forEach(p => {
      queue.push(`${p}_light`);
      queue.push(`${p}_lightquiz`);
    });
    queue.push('combined_exam');
    queue.push('bevis');
  }
  return queue;
}

function stepInfoFor(stateName) {
  if (stateName === 'bevis')         return { short: '🏆',  long: 'Bevis' };
  if (stateName === 'combined_exam') return { short: '🎓',  long: 'Eksamen' };
  const [prog, kind] = stateName.split('_');
  const ps = PROGRAM_SHORT[prog] || prog;
  if (kind === 'm1')        return { short: ps + '·1', long: PROGRAM_LABELS[prog] + ' M1' };
  if (kind === 'm2')        return { short: ps + '·2', long: PROGRAM_LABELS[prog] + ' M2' };
  if (kind === 'quiz')      return { short: 'Q',       long: PROGRAM_LABELS[prog] + ' Quiz' };
  if (kind === 'exam')      return { short: '🏆',      long: PROGRAM_LABELS[prog] + ' Eksamen' };
  if (kind === 'light')     return { short: ps,        long: PROGRAM_LABELS[prog] };
  if (kind === 'lightquiz') return { short: 'Q',       long: PROGRAM_LABELS[prog] + ' Quiz' };
  return { short: '·', long: stateName };
}

/* Tidsestimater */
function totalTimeForChoice(choice, programs) {
  if (choice === 'deep') {
    let total = 0;
    programs.forEach(p => total += DEEP_CONTENT[p].timeMin);
    total += programs.length * 18;
    return total;
  } else {
    let total = 0;
    ['excel','word','ppt','slides'].forEach(p => total += LIGHT_CONTENT[p].timeMin);
    total += 4 * 6;
    total += 22;
    return total;
  }
}
function formatTime(minutes) {
  if (minutes < 60) return `${minutes} min`;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (m === 0) return `${h} time${h > 1 ? 'r' : ''}`;
  return `${h}t ${m}min`;
}
function totalRangeForCourse() {
  const lightTotal = totalTimeForChoice('all', []);
  const programTimes = ['excel','word','ppt','slides'].map(p => DEEP_CONTENT[p].timeMin);
  const sortedAsc = [...programTimes].sort((a,b)=>a-b);
  const sortedDesc = [...programTimes].sort((a,b)=>b-a);
  const minTwo = sortedAsc.slice(0,2).reduce((s,n)=>s+n,0) + 36;
  const maxTwo = sortedDesc.slice(0,2).reduce((s,n)=>s+n,0) + 36;
  const lo = Math.min(lightTotal, minTwo);
  const hi = Math.max(lightTotal, maxTwo);
  return { lo, hi };
}

/* =====================================================================
   TOPBAR PROGRESS
   ===================================================================== */
function updateTopbar() {
  if (!courseState.locked) {
    document.getElementById('topbar').classList.remove('show');
    return;
  }
  document.getElementById('topbar').classList.add('show');
  const total = courseState.stateQueue.length;
  const idx = courseState.currentStateIndex;
  const pct = Math.round((idx / Math.max(total - 1, 1)) * 100);
  document.getElementById('topbar-fill').style.width = pct + '%';
  document.getElementById('topbar-pct').textContent = pct + '%';
  const cur = courseState.stateQueue[idx];
  const isLight = courseState.userChoice === 'all';

  let fillColor = colorFor(cur, isLight);
  if (cur === 'combined_exam') fillColor = PURPLE;
  if (fillColor) document.getElementById('topbar-fill').style.background = fillColor;

  document.getElementById('topbar-label').textContent = stepInfoFor(cur).long;

  const sb = document.getElementById('steps-bar');
  sb.innerHTML = '';
  courseState.stateQueue.forEach((s, i) => {
    const info = stepInfoFor(s);
    let cls = 'next';
    if (i < idx) cls = 'done';
    else if (i === idx) cls = 'active';

    let bgStyle = '';
    if (cls === 'active') {
      const c = colorFor(s, isLight) || PURPLE;
      bgStyle = `style="background:${c};border-color:${c};"`;
    }

    sb.insertAdjacentHTML('beforeend', `
      <div class="step-item">
        <div class="step-dot ${cls}" ${bgStyle}>${info.short}</div>
        <span class="step-label ${cls}">${info.long}</span>
      </div>
      ${i < courseState.stateQueue.length - 1 ? '<span class="step-arrow">›</span>' : ''}
    `);
  });
}

function submitIntroForm() {
  const fn = document.getElementById('fn').value.trim();

  const em = document.getElementById('em').value.trim();
  let valid = true;
  ['ff-firstname','ff-lastname','ff-email'].forEach(id => {

  });
  if (!fn) { document.getElementById('ff-firstname').classList.add('error'); valid = false; }
  if (!ln) { document.getElementById('ff-lastname').classList.add('error'); valid = false; }
  const emRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emRe.test(em)) { document.getElementById('ff-email').classList.add('error'); valid = false; }
  if (!valid) {
    document.querySelector('.name-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  courseState.user = { firstName: fn, lastName: ln, email: em };
  goToValg();
}

}

function selectChoice(choice) {
  courseState.userChoice = choice;
  document.getElementById('card-deep').classList.toggle('selected', choice === 'deep');
  document.getElementById('card-all').classList.toggle('selected', choice === 'all');
  if (choice === 'all') {
    courseState.selectedPrograms = ['excel', 'word', 'ppt', 'slides'];
    courseState.programOrder = ['excel', 'word', 'ppt', 'slides'];
  } else {
    courseState.selectedPrograms = [];
    courseState.programOrder = [];
  }
  updateStartLabel();
}

function toggleProgram(prog) {
  if (courseState.userChoice !== 'deep') {
    selectChoice('deep');
  }
  const isChecked = courseState.selectedPrograms.includes(prog);
  if (isChecked) {
    courseState.selectedPrograms = courseState.selectedPrograms.filter(p => p !== prog);
  } else {
    if (courseState.selectedPrograms.length >= 2) {
      const err = document.getElementById('choice-error');
      err.classList.add('show');
      setTimeout(() => err.classList.remove('show'), 2400);
      return;
    }
    courseState.selectedPrograms.push(prog);
  }
  document.querySelectorAll('.program-check').forEach(el => {
    const p = el.dataset.prog;
    const checked = courseState.selectedPrograms.includes(p);
    el.classList.toggle('checked', checked);
    if (checked) el.querySelector('.pc-box').textContent = '✓';
    else el.querySelector('.pc-box').textContent = '';
  });
  const orderRow = document.getElementById('order-row');
  const select = document.getElementById('order-select');
  if (courseState.selectedPrograms.length === 2) {
    orderRow.classList.add('show');
    select.innerHTML = courseState.selectedPrograms.map(p => `<option value="${p}">${PROGRAM_LABELS[p]}</option>`).join('');
    courseState.programOrder = [...courseState.selectedPrograms];
  } else {
    orderRow.classList.remove('show');
  }
  updateStartLabel();
}

function updateStartLabel() {
  const btn = document.getElementById('btn-start');
  if (!btn) return;
  if (courseState.userChoice === 'deep') {
    if (courseState.selectedPrograms.length !== 2) {
      btn.disabled = true;
      btn.textContent = 'Vælg 2 programmer';
      return;
    }
    const select = document.getElementById('order-select');
    if (select && select.value) {
      const first = select.value;
      const second = courseState.selectedPrograms.find(p => p !== first);
      courseState.programOrder = [first, second];
    } else {
      courseState.programOrder = [...courseState.selectedPrograms];
    }
    btn.disabled = false;
    btn.innerHTML = `Start med ${PROGRAM_LABELS[courseState.programOrder[0]]} →`;
  } else if (courseState.userChoice === 'all') {
    btn.disabled = false;
    btn.innerHTML = `Start lidt af hvert →`;
  } else {
    btn.disabled = true;
    btn.textContent = 'Vælg et forløb først';
  }
}

function lockAndStart() {
  // Ingen native confirm() — den var problem 7
  courseState.locked = true;
  courseState.startTime = new Date();
  courseState.stateQueue = generateStateQueue(courseState.userChoice, courseState.selectedPrograms, courseState.programOrder);
  courseState.currentStateIndex = 0;
  renderCurrentState();
}

function nextState() {
  courseState.currentStateIndex++;
  if (courseState.currentStateIndex >= courseState.stateQueue.length) return;
  renderCurrentState();
}

function renderCurrentState() {
  const cur = courseState.stateQueue[courseState.currentStateIndex];
  updateTopbar();
  if (cur === 'bevis') return renderBevis();
  if (cur === 'combined_exam') return renderCombinedExam();
  const [prog, kind] = cur.split('_');
  if (kind === 'm1' || kind === 'm2') return renderModule(prog, kind);
  if (kind === 'quiz')                return renderQuiz(prog, false);
  if (kind === 'exam')                return renderExam(prog);
  if (kind === 'light')               return renderLightModule(prog);
  if (kind === 'lightquiz')           return renderQuiz(prog, true);
}

/* =====================================================================
   RENDER — QUIZ
   ===================================================================== */
let quizState = { questions: [], current: 0, score: 0, answered: false, isLight: false, prog: '', passScore: 5, color: PURPLE };

function renderQuiz(prog, isLight) {
  const rawQuestions = isLight ? LIGHT_QUIZ[prog] : DEEP_CONTENT[prog].quiz;
  const questions = rawQuestions.map((q, i) => prepareQuestion(q, i));

  const color = isLight ? PROGRAM_ORIG[prog] : PROGRAM_COLORS[prog].quiz;

  quizState = {
    questions, current: 0, score: 0, answered: false,
    isLight, prog, passScore: 5, color
  };

  document.getElementById('container').innerHTML = `
    <div class="state active">
      <div class="quiz-card">
        <div class="quiz-header" style="background:${color};">
          <div class="quiz-tag">${PROGRAM_LABELS[prog]} · Mini-quiz</div>

        </div>
        <div class="quiz-progress">

            <span id="prog-score">0 rigtige</span>
          </div>
          <div class="quiz-prog-track">

          </div>
        </div>
        <div class="quiz-question-wrap">
          <div class="q-number" id="q-number" style="color:${color};">Spørgsmål 1</div>
          <div class="q-text" id="q-text"></div>
        </div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-feedback" id="quiz-feedback">
          <span class="feedback-icon" id="fb-icon"></span>
          <span id="fb-text"></span>
        </div>
        <div class="quiz-divider"></div>
        <div class="quiz-next-wrap">
          <button class="btn-next" id="btn-next" style="background:${color};" onclick="quizNext()">Næste spørgsmål <span>→</span></button>
        </div>
        <div class="quiz-result" id="quiz-result">
          <div class="result-icon" id="result-icon"></div>
          <h2 class="result-title" id="result-title"></h2>
          <p class="result-sub" id="result-sub"></p>
          <div class="score-badge" id="score-badge"></div>
          <div class="result-message" id="result-message"></div>
          <div class="result-btn-row">
            <button class="btn-retry" onclick="restartQuiz()">↺ Prøv igen</button>
            <button class="btn btn-success" id="btn-quiz-continue" style="display:none;" onclick="nextState()">Fortsæt →</button>
          </div>
        </div>
      </div>
    </div>
  `;
  renderQuizQuestion();
  window.scrollTo(0, 0);
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.current];
  document.getElementById('q-number').textContent = `Spørgsmål ${quizState.current + 1}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-label').textContent = `Spørgsmål ${quizState.current + 1} af ${quizState.questions.length}`;
  const pct = (quizState.current / quizState.questions.length) * 100;
  document.getElementById('quiz-prog-fill').style.width = pct + '%';

  const optsContainer = document.getElementById('quiz-options');
  const letters = ['A', 'B', 'C', 'D'];
  optsContainer.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" onclick="quizSelect(${i})">
      <div class="option-letter">${letters[i]}</div>
      <span>${opt}</span>
    </button>
  `).join('');
  // Hover-effekt med dynamisk farve
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('mouseover', function() {
      if (this.disabled) return;
      this.style.borderColor = quizState.color;
      this.style.background = quizState.color + '15';
    });
    btn.addEventListener('mouseout', function() {
      if (this.disabled) return;
      this.style.borderColor = '';
      this.style.background = '';
    });
  });
  document.getElementById('quiz-feedback').classList.remove('show', 'correct-fb', 'wrong-fb');
  document.getElementById('btn-next').classList.remove('show');
  quizState.answered = false;
  updateQuizScore();
}

function quizSelect(idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  const isRight = idx === q.correct;
  if (isRight) quizState.score++;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    btn.style.borderColor = '';
    btn.style.background = '';
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !isRight) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.classList.add('show', isRight ? 'correct-fb' : 'wrong-fb');
  document.getElementById('fb-icon').textContent = isRight ? '✓' : '✗';
  document.getElementById('fb-text').textContent = q.explanation;
  const nextBtn = document.getElementById('btn-next');
  const isLast = quizState.current === quizState.questions.length - 1;
  nextBtn.classList.add('show');
  nextBtn.innerHTML = isLast ? 'Se resultat <span>→</span>' : 'Næste spørgsmål <span>→</span>';
  updateQuizScore();
}

function updateQuizScore() {
  const el = document.getElementById('prog-score');
  if (el) el.textContent = quizState.score === 1 ? '1 rigtig' : `${quizState.score} rigtige`;
}

function quizNext() {
  quizState.current++;
  if (quizState.current >= quizState.questions.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResult() {
  ['quiz-progress', 'quiz-question-wrap', 'quiz-options', 'quiz-feedback', 'quiz-divider', 'quiz-next-wrap'].forEach(c => {
    const el = document.querySelector('.' + c);
    if (el) el.style.display = 'none';
  });
  const passed = quizState.score >= quizState.passScore;
  document.getElementById('result-icon').textContent = passed ? '🎉' : '💪';
  document.getElementById('result-title').textContent = passed ? 'Godt klaret!' : 'Ikke helt endnu';
  document.getElementById('result-sub').textContent = passed
    ? `Du svarede rigtigt på ${quizState.score} ud af ${quizState.questions.length}.`
    : `Du fik ${quizState.score} ud af ${quizState.questions.length}. Du skal have mindst ${quizState.passScore}. Prøv igen!`;
  const badge = document.getElementById('score-badge');
  badge.className = `score-badge ${passed ? 'pass' : 'fail'}`;
  badge.textContent = `${quizState.score} / ${quizState.questions.length} rigtige`;
  document.getElementById('result-message').innerHTML = passed
    ? `<strong>Næste skridt:</strong> Du har styr på de centrale teknikker. Klik fortsæt for at gå videre i forløbet.`
    : `<strong>Tip:</strong> Gå tilbage og læs modulet. Du kan tage quizzen ubegrænsede gange — det er meningen at du skal lykkes.`;
  if (passed) {
    courseState.quizScores[quizState.prog + (quizState.isLight ? '_light' : '')] = quizState.score;
    document.getElementById('btn-quiz-continue').style.display = 'inline-flex';
  }
  document.getElementById('quiz-result').classList.add('show');
}

function restartQuiz() {
  renderQuiz(quizState.prog, quizState.isLight);
}

          <span class="exam-req-pill" style="background:${accent}22;color:${accent};">Ingen tidsbegrænsning</span>
          <span class="exam-req-pill" style="background:${accent}22;color:${accent};">Ubegrænsede forsøg</span>

      </div>
      ${questionsHtml}
      <div class="exam-submit-bar">
        <span class="exam-progress-text" id="exam-progress-text">0 af ${examState.questions.length} besvaret</span>

function examSelect(qi, oi) {
  if (examState.submitted) return;
  examState.answers[qi] = oi;
  const opts = document.querySelectorAll(`.exam-option[data-q="${qi}"]`);
  opts.forEach(o => {
    o.classList.remove('selected');
    o.style.borderColor = '';
    o.style.background = '';
  });
  const sel = document.querySelector(`.exam-option[data-q="${qi}"][data-o="${oi}"]`);
  sel.classList.add('selected');
  sel.style.borderColor = examState.accent;
  sel.style.background = examState.accent + '22';
  const answered = examState.answers.filter(a => a !== null).length;
  document.getElementById('exam-progress-text').textContent = `${answered} af ${examState.questions.length} besvaret`;
  document.getElementById('exam-submit').disabled = answered < examState.questions.length;
}

function submitExam() {
  examState.submitted = true;
  let score = 0;
  examState.questions.forEach((q, qi) => {
    const ans = examState.answers[qi];
    const correct = q.correct;
    const opts = document.querySelectorAll(`.exam-option[data-q="${qi}"]`);
    opts.forEach(o => {
      o.classList.add('locked');
      o.classList.remove('selected');
      o.style.borderColor = '';
      o.style.background = '';
      const oi = parseInt(o.dataset.o);
      if (oi === correct) o.classList.add('correct');
      else if (oi === ans) o.classList.add('wrong');
    });
    if (ans === correct) score++;
    const exp = document.getElementById(`exp-${qi}`);
    exp.classList.add('show');
    exp.innerHTML = `<strong>${ans === correct ? '✓ Rigtigt' : '✗ Ikke rigtigt'}.</strong> ${q.explanation}`;
  });
  const passed = score >= examState.passScore;
  const card = document.getElementById('exam-result-card');
  card.classList.add('show', passed ? 'passed' : 'failed');
  document.getElementById('exam-result-icon').textContent = passed ? '🏆' : '💪';
  document.getElementById('exam-result-title').textContent = passed ? 'Bestået!' : 'Ikke bestået denne gang';
  document.getElementById('exam-result-sub').textContent = passed
    ? `Du svarede rigtigt på ${score} ud af ${examState.questions.length} spørgsmål.`
    : `Du fik ${score} ud af ${examState.questions.length}. Du skal have mindst ${examState.passScore} for at bestå.`;
  const badge = document.getElementById('exam-score-badge');
  badge.className = `score-badge ${passed ? 'pass' : 'fail'}`;
  badge.textContent = `${score} / ${examState.questions.length} rigtige`;
  document.getElementById('exam-result-message').innerHTML = passed
    ? `<strong>Flot klaret!</strong> Du har demonstreret at du kan anvende stoffet i praksis. Klik fortsæt for at gå videre.`
    : `<strong>Tip:</strong> Læs forklaringerne ved hvert spørgsmål — de viser dig præcis hvor logikken klikkede. Eksamen kan tages ubegrænsede gange.`;
  if (passed) {
    courseState.examScores[examState.prog] = score;
    document.getElementById('exam-continue').style.display = 'inline-flex';
    document.getElementById('exam-retry').style.display = 'none';
  }
  document.getElementById('exam-submit').disabled = true;
  document.getElementById('exam-submit').textContent = 'Eksamen indleveret';
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryExam() {
  if (examState.isCombined) renderCombinedExam();
  else renderExam(examState.prog);
}

/* =====================================================================
   RENDER — BEVIS
   ===================================================================== */

  const programs = courseState.userChoice === 'deep' ? courseState.programOrder : ['excel', 'word', 'ppt', 'slides'];

  const dato = new Date().toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
  const programsText = programs.map(p => PROGRAM_LABELS[p]).join(', ');
  const fullName = `${courseState.user.firstName} ${courseState.user.lastName}`;

  document.getElementById('container').innerHTML = `
    <div class="state active">
      <div class="bevis-wrap">
        <div class="bevis-card" id="bevis-print">
          <div class="bevis-logo">
            <div class="bevis-logo-icon">
              <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H6Z"/></svg>
            </div>
            <span class="bevis-logo-text">LearnAI DK</span>
          </div>
          <div class="bevis-badge">Sidekursusbevis</div>
          <h1>AI til dokumenter <br><span class="accent">— bestået</span></h1>
          <div class="bevis-name">${fullName}</div>
          <div class="bevis-programs">${programsHtml}</div>
          <div class="bevis-date">${dato}</div>
          <p class="bevis-text">${fullName} har gennemført sidekurset Dokumenter og demonstreret evnen til at bruge AI professionelt i ${programsText}, og kan nu spare betydelige timer i sit daglige arbejde.</p>
          <div class="bevis-actions">
            <button class="btn btn-secondary" onclick="window.print()">🖨 Print bevis</button>
            <a href="platform.html" class="btn btn-success">Tilbage til platformen →</a>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('topbar-fill').style.width = '100%';
  document.getElementById('topbar-pct').textContent = '100%';
  document.getElementById('topbar-label').textContent = 'Forløb gennemført 🎉';
  window.scrollTo(0, 0);
}

   INIT
   ===================================================================== */
renderIntro();
