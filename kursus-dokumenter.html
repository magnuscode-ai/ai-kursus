<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnAI DK — Sidekursus: AI til dokumenter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Farvevariabler — matcher resten af platformen ──── */
    :root {
      --blue:        #185FA5;
      --blue-light:  #E6F1FB;
      --blue-mid:    #c8dff5;
      --green:       #0F6E56;
      --green-light: #E1F5EE;
      --orange:      #C45000;
      --orange-light:#FFF0E6;
      --yellow-bg:   #FFF3CD;
      --yellow-txt:  #856404;
      --purple:      #5B2A86;
      --purple-light:#EFE5FA;
      --purple-dark: #46206a;
      --red:         #B42318;
      --red-light:   #FEE4E2;
      --grey:        #F5F5F5;
      --border:      #E2E8F0;
      --bg:          #F4F7FB;
      --white:       #FFFFFF;
      --text:        #1A1A1A;
      --muted:       #6B7280;
      --gold:        #B8860B;
      --gold-light:  #FFF8E1;
      --radius:      14px;
      --radius-lg:   18px;
      --shadow:      0 4px 24px rgba(91,42,134,0.10);
      --shadow-lg:   0 10px 40px rgba(91,42,134,0.18);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Navigation ──────────────────────────────────────── */
    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-size: 16px; font-weight: 700;
      color: var(--text); text-decoration: none;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--blue); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 15px; height: 15px; fill: white; }
    .nav-tag {
      font-size: 13px; color: var(--muted);
      background: var(--grey); padding: 5px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── Topbar progress (når man er i forløb) ───────────── */
    .topbar {
      display: none;
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      position: sticky;
      top: 56px;
      z-index: 90;
    }
    .topbar.show { display: block; }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
    }
    .topbar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .topbar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .topbar-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .steps-bar {
      max-width: 1100px;
      margin: 0.75rem auto 0;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .steps-bar::-webkit-scrollbar { height: 4px; }
    .steps-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .step-item {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .step-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      background: var(--grey);
      color: var(--muted);
      border: 2px solid var(--border);
    }
    .step-dot.done { background: var(--green); color: white; border-color: var(--green); }
    .step-dot.active { background: var(--purple); color: white; border-color: var(--purple); box-shadow: 0 0 0 4px rgba(91,42,134,0.18); }
    .step-dot.next { background: white; color: var(--muted); }
    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }
    .step-label.done { color: var(--green); }
    .step-label.active { color: var(--purple); }
    .step-arrow { color: var(--border); font-size: 14px; flex-shrink: 0; }

    /* ── Indhold-container ───────────────────────────────── */
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── State styring ───────────────────────────────────── */
    .state { display: none; }
    .state.active { display: block; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero (lilla) ────────────────────────────────────── */
    .hero {
      background: var(--purple);
      color: white;
      border-radius: var(--radius-lg);
      padding: 2.75rem 2rem 2.25rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow);
    }
    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 38px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
    }
    .hero p {
      font-size: 16px;
      opacity: 0.92;
      max-width: 620px;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
    }
    .hero-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      opacity: 0.92;
      font-weight: 500;
    }
    .hero-meta-item span { font-size: 16px; }

    /* ── Info-bokse ──────────────────────────────────────── */
    .info-box {
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
    }
    .info-box-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }
    .info-box p { font-size: 14px; line-height: 1.7; }
    .info-box code {
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: 'Courier New', monospace;
    }
    .box-blue   { background: var(--blue-light);  } .box-blue .info-box-title   { color: var(--blue); }
    .box-green  { background: var(--green-light); } .box-green .info-box-title  { color: var(--green); }
    .box-yellow { background: var(--yellow-bg);   } .box-yellow .info-box-title { color: var(--yellow-txt); }
    .box-grey   { background: var(--grey);        } .box-grey .info-box-title   { color: #444; }
    .box-orange { background: var(--orange-light);} .box-orange .info-box-title { color: var(--orange); }
    .box-purple { background: var(--purple-light);} .box-purple .info-box-title { color: var(--purple); }
    .box-red    { background: var(--red-light);   } .box-red .info-box-title    { color: var(--red); }

    /* ── Knapper ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--purple);
      color: white;
      box-shadow: 0 4px 14px rgba(91,42,134,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--purple-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(91,42,134,0.4);
    }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-secondary {
      background: white;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--purple); color: var(--purple); }
    .btn-large { padding: 16px 36px; font-size: 16px; }
    .btn-success {
      background: var(--green);
      color: white;
    }
    .btn-success:hover { background: #0a5640; }

    /* ── Valgkort (state 2) ──────────────────────────────── */
    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin: 1.5rem 0;
    }
    .choice-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .choice-card:hover {
      border-color: var(--purple);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .choice-card.selected {
      border-color: var(--purple);
      border-width: 3px;
      box-shadow: 0 0 0 4px rgba(91,42,134,0.12), var(--shadow);
    }
    .choice-card.selected::after {
      content: '✓';
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px; height: 28px;
      background: var(--purple);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .choice-icon {
      width: 56px; height: 56px;
      margin-bottom: 1rem;
    }
    .choice-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .choice-card .choice-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .program-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 1rem;
    }
    .program-check {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
    }
    .program-check:hover:not(.disabled) {
      border-color: var(--purple);
      background: var(--purple-light);
    }
    .program-check.checked {
      border-color: var(--purple);
      background: var(--purple-light);
      color: var(--purple);
    }
    .program-check.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .program-check .pc-box {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: white;
      transition: all 0.15s;
    }
    .program-check.checked .pc-box {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }
    .program-check .pc-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }
    .order-row {
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .order-row.show { display: flex; }
    .order-row select {
      flex: 1;
      padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 0.5rem;
    }
    .pill-list .pill {
      background: var(--grey);
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .choice-error {
      display: none;
      background: var(--red-light);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .choice-error.show { display: block; }
    .start-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .lock-warn {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Modul-sektion ───────────────────────────────────── */
    .module {
      background: white;
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .module-header {
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .module-header:hover { background: var(--bg); }
    .module-letter {
      width: 36px; height: 36px;
      background: var(--purple);
      color: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      flex-shrink: 0;
    }
    .module-title-wrap { flex: 1; }
    .module-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .module-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .module-toggle {
      width: 32px; height: 32px;
      background: var(--purple-light);
      color: var(--purple);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      font-weight: 400;
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .module.open .module-toggle { transform: rotate(45deg); }
    .module-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      padding: 0 1.5rem;
    }
    .module.open .module-body {
      max-height: 12000px;
      padding: 0.25rem 1.5rem 1.75rem;
    }

    /* ── Indhold inde i moduler ──────────────────────────── */
    .prose {
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .prose strong { color: var(--text); font-weight: 700; }
    h3.subhead {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 1.25rem 0 0.6rem;
    }
    .numbered-list, .bullet-list {
      padding-left: 1.3rem;
      margin-bottom: 1.25rem;
    }
    .numbered-list li, .bullet-list li {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 6px;
      color: var(--text);
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── Kodeblok ────────────────────────────────────────── */
    .code-block {
      background: #1e2a3a;
      color: #e2f0fb;
      border-radius: 10px;
      padding: 1rem 1.15rem;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .code-label {
      display: inline-block;
      background: var(--purple-light);
      color: var(--purple);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
      margin-bottom: 0.4rem;
    }

    /* ── Øvelsesboks ─────────────────────────────────────── */
    .practice {
      background: var(--orange-light);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 1.25rem;
      border-left: 3px solid var(--orange);
    }
    .practice-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--orange);
      margin-bottom: 0.5rem;
    }
    .practice ol { padding-left: 1.2rem; }
    .practice li, .practice p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }
    .practice li { margin-bottom: 4px; }

    /* ── Opsummering ─────────────────────────────────────── */
    .summary {
      background: var(--purple);
      border-radius: var(--radius);
      padding: 1.5rem 1.5rem;
      color: white;
      margin: 1.5rem 0 1.25rem;
    }
    .summary h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 19px;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    .summary ul { padding-left: 1.2rem; }
    .summary li {
      font-size: 14px;
      line-height: 1.75;
      opacity: 0.94;
      margin-bottom: 4px;
    }

    /* ── Quiz/Eksamen CTA ────────────────────────────────── */
    .next-cta {
      background: white;
      border: 2px solid var(--purple);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: 1.5rem;
    }
    .next-cta-icon { font-size: 36px; margin-bottom: 0.5rem; }
    .next-cta h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .next-cta p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .next-cta .req {
      display: inline-block;
      background: var(--yellow-bg);
      color: var(--yellow-txt);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    /* ── Quiz UI ─────────────────────────────────────────── */
    .quiz-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .quiz-header {
      background: var(--purple);
      color: white;
      padding: 1.75rem 2rem 1.5rem;
    }
    .quiz-tag {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      margin-bottom: 0.5rem;
    }
    .quiz-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }
    .quiz-header p {
      font-size: 14px;
      opacity: 0.85;
    }
    .quiz-progress {
      padding: 1.25rem 2rem 0;
    }
    .quiz-prog-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .quiz-prog-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .quiz-prog-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .quiz-question-wrap { padding: 1.5rem 2rem 0; }
    .q-number {
      font-size: 11px;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .q-text {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
    }
    .quiz-options {
      padding: 1.25rem 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--purple);
      background: var(--purple-light);
      transform: translateY(-1px);
    }
    .option-letter {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);

/* =====================================================================
   STATE-KØ-GENERERING
   ===================================================================== */
function generateStateQueue(choice, programs, order) {
  const queue = [];
  if (choice === 'deep') {
    const ordered = (order && order.length === 2) ? order : programs;
    ordered.forEach(p => {
      queue.push(`${p}_m1`);
      queue.push(`${p}_quiz`);
      queue.push(`${p}_m2`);
      queue.push(`${p}_exam`);
    });
    queue.push('bevis');
  } else {
    const all = ['excel', 'word', 'ppt', 'slides'];
    all.forEach(p => {
      queue.push(`${p}_light`);
      queue.push(`${p}_lightquiz`);
    });
    queue.push('combined_exam');
    queue.push('bevis');
  }
  return queue;
}

function stepInfoFor(stateName) {
  if (stateName === 'bevis')         return { short: '🏆',  long: 'Bevis' };
  if (stateName === 'combined_exam') return { short: '🎓',  long: 'Eksamen' };
  const [prog, kind] = stateName.split('_');
  const ps = PROGRAM_SHORT[prog] || prog;
  if (kind === 'm1')        return { short: ps + '·1', long: PROGRAM_LABELS[prog] + ' M1' };
  if (kind === 'm2')        return { short: ps + '·2', long: PROGRAM_LABELS[prog] + ' M2' };
  if (kind === 'quiz')      return { short: 'Q',       long: PROGRAM_LABELS[prog] + ' Quiz' };
  if (kind === 'exam')      return { short: '🏆',      long: PROGRAM_LABELS[prog] + ' Eksamen' };
  if (kind === 'light')     return { short: ps,        long: PROGRAM_LABELS[prog] };
  if (kind === 'lightquiz') return { short: 'Q',       long: PROGRAM_LABELS[prog] + ' Quiz' };
  return { short: '·', long: stateName };
}

/* =====================================================================
   TOPBAR PROGRESS UPDATE
   ===================================================================== */
function updateTopbar() {
  if (!courseState.locked) {
    document.getElementById('topbar').classList.remove('show');
    return;
  }
  document.getElementById('topbar').classList.add('show');
  const total = courseState.stateQueue.length;
  const idx = courseState.currentStateIndex;
  const pct = Math.round((idx / Math.max(total - 1, 1)) * 100);
  document.getElementById('topbar-fill').style.width = pct + '%';
  document.getElementById('topbar-pct').textContent = pct + '%';
  const cur = courseState.stateQueue[idx];
  document.getElementById('topbar-label').textContent = stepInfoFor(cur).long;

  const sb = document.getElementById('steps-bar');
  sb.innerHTML = '';
  courseState.stateQueue.forEach((s, i) => {
    const info = stepInfoFor(s);
    let cls = 'next';
    if (i < idx) cls = 'done';
    else if (i === idx) cls = 'active';
    sb.insertAdjacentHTML('beforeend', `
      <div class="step-item">
        <div class="step-dot ${cls}">${info.short}</div>
        <span class="step-label ${cls}">${info.long}</span>
      </div>
      ${i < courseState.stateQueue.length - 1 ? '<span class="step-arrow">›</span>' : ''}
    `);
  });
}

/* =====================================================================
   VALG-LOGIK
   ===================================================================== */
function goToValg() { renderValg(); }

function selectChoice(choice) {
  courseState.userChoice = choice;
  document.getElementById('card-deep').classList.toggle('selected', choice === 'deep');
  document.getElementById('card-all').classList.toggle('selected', choice === 'all');
  if (choice === 'all') {
    courseState.selectedPrograms = ['excel', 'word', 'ppt', 'slides'];
    courseState.programOrder = ['excel', 'word', 'ppt', 'slides'];
  } else {
    courseState.selectedPrograms = [];
    courseState.programOrder = [];
  }
  updateStartLabel();
}

function toggleProgram(prog) {
  // Aktivér deep-kortet hvis ikke allerede valgt
  if (courseState.userChoice !== 'deep') {
    selectChoice('deep');
  }
  const checks = document.querySelectorAll('.program-check');
  const isChecked = courseState.selectedPrograms.includes(prog);
  if (isChecked) {
    courseState.selectedPrograms = courseState.selectedPrograms.filter(p => p !== prog);
  } else {
    if (courseState.selectedPrograms.length >= 2) {
      const err = document.getElementById('choice-error');
      err.classList.add('show');
      setTimeout(() => err.classList.remove('show'), 2200);
      return;
    }
    courseState.selectedPrograms.push(prog);
  }
  // Opdater UI
  checks.forEach(el => {
    const p = el.dataset.prog;
    const checked = courseState.selectedPrograms.includes(p);
    el.classList.toggle('checked', checked);
    if (checked) el.querySelector('.pc-box').textContent = '✓';
    else el.querySelector('.pc-box').textContent = '';
  });
  // Opdater order-dropdown
  const orderRow = document.getElementById('order-row');
  const select = document.getElementById('order-select');
  if (courseState.selectedPrograms.length === 2) {
    orderRow.classList.add('show');
    select.innerHTML = courseState.selectedPrograms.map(p => `<option value="${p}">${PROGRAM_LABELS[p]}</option>`).join('');
    courseState.programOrder = [...courseState.selectedPrograms];
  } else {
    orderRow.classList.remove('show');
  }
  updateStartLabel();
}

function updateStartLabel() {
  const btn = document.getElementById('btn-start');
  if (!btn) return;
  if (courseState.userChoice === 'deep') {
    if (courseState.selectedPrograms.length !== 2) {
      btn.disabled = true;
      btn.textContent = 'Vælg 2 programmer';
      return;
    }
    // Sikr at programOrder afspejler dropdown
    const select = document.getElementById('order-select');
    if (select && select.value) {
      const first = select.value;
      const second = courseState.selectedPrograms.find(p => p !== first);
      courseState.programOrder = [first, second];
    } else {
      courseState.programOrder = [...courseState.selectedPrograms];
    }
    btn.disabled = false;
    btn.innerHTML = `Start med ${PROGRAM_LABELS[courseState.programOrder[0]]} →`;
  } else if (courseState.userChoice === 'all') {
    btn.disabled = false;
    btn.innerHTML = `Start med lidt af hvert →`;
  } else {
    btn.disabled = true;
    btn.textContent = 'Vælg et forløb først';
  }
}

function confirmAndStart() {
  const ok = confirm('Er du sikker? Dit valg kan ikke ændres bagefter.');
  if (!ok) return;
  courseState.locked = true;
  courseState.startTime = new Date();
  courseState.stateQueue = generateStateQueue(courseState.userChoice, courseState.selectedPrograms, courseState.programOrder);
  courseState.currentStateIndex = 0;
  renderCurrentState();
}

function nextState() {
  courseState.currentStateIndex++;
  if (courseState.currentStateIndex >= courseState.stateQueue.length) {
    return; // Kursus slut
  }
  renderCurrentState();
}

function renderCurrentState() {
  const cur = courseState.stateQueue[courseState.currentStateIndex];
  updateTopbar();
  if (cur === 'bevis') return renderBevis();
  if (cur === 'combined_exam') return renderCombinedExam();
  const [prog, kind] = cur.split('_');
  if (kind === 'm1' || kind === 'm2') return renderModule(prog, kind);
  if (kind === 'quiz')                return renderQuiz(prog, false);
  if (kind === 'exam')                return renderExam(prog);
  if (kind === 'light')               return renderLightModule(prog);
  if (kind === 'lightquiz')           return renderQuiz(prog, true);
}

            <button class="btn btn-success" id="btn-quiz-continue" style="display:none;" onclick="nextState()">Fortsæt →</button>
          </div>
        </div>
      </div>
    </div>
  `;
  renderQuizQuestion();
  window.scrollTo(0, 0);
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.current];
  document.getElementById('q-number').textContent = `Spørgsmål ${quizState.current + 1}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-label').textContent = `Spørgsmål ${quizState.current + 1} af ${quizState.questions.length}`;
  const pct = (quizState.current / quizState.questions.length) * 100;
  document.getElementById('quiz-prog-fill').style.width = pct + '%';
  const optsContainer = document.getElementById('quiz-options');
  const letters = ['A', 'B', 'C', 'D'];
  optsContainer.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" onclick="quizSelect(${i})">
      <div class="option-letter">${letters[i]}</div>
      <span>${opt}</span>
    </button>
  `).join('');
  document.getElementById('quiz-feedback').classList.remove('show', 'correct-fb', 'wrong-fb');
  document.getElementById('btn-next').classList.remove('show');
  quizState.answered = false;
  updateQuizScore();
}

function quizSelect(idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  const isRight = idx === q.correct;
  if (isRight) quizState.score++;
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !isRight) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.classList.add('show', isRight ? 'correct-fb' : 'wrong-fb');
  document.getElementById('fb-icon').textContent = isRight ? '✓' : '✗';
  document.getElementById('fb-text').textContent = q.explanation;
  const nextBtn = document.getElementById('btn-next');
  const isLast = quizState.current === quizState.questions.length - 1;
  nextBtn.classList.add('show');
  nextBtn.innerHTML = isLast ? 'Se resultat <span>→</span>' : 'Næste spørgsmål <span>→</span>';
  updateQuizScore();
}

function updateQuizScore() {
  document.getElementById('prog-score').textContent = quizState.score === 1 ? '1 rigtig' : `${quizState.score} rigtige`;
}

function quizNext() {
  quizState.current++;
  if (quizState.current >= quizState.questions.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResult() {
  ['quiz-progress', 'quiz-question-wrap', 'quiz-options', 'quiz-feedback', 'quiz-divider', 'quiz-next-wrap'].forEach(c => {
    document.querySelector('.' + c).style.display = 'none';
  });
  const passed = quizState.score >= quizState.passScore;
  document.getElementById('result-icon').textContent = passed ? '🎉' : '💪';
  document.getElementById('result-title').textContent = passed ? 'Godt klaret!' : 'Ikke helt endnu';
  document.getElementById('result-sub').textContent = passed
    ? `Du svarede rigtigt på ${quizState.score} ud af ${quizState.questions.length}.`
    : `Du fik ${quizState.score} ud af ${quizState.questions.length}. Du skal have mindst ${quizState.passScore}. Prøv igen!`;
  const badge = document.getElementById('score-badge');
  badge.className = `score-badge ${passed ? 'pass' : 'fail'}`;
  badge.textContent = `${quizState.score} / ${quizState.questions.length} rigtige`;
  document.getElementById('result-message').innerHTML = passed
    ? `<strong>Næste skridt:</strong> Du har styr på de centrale teknikker. Klik fortsæt for at gå videre i forløbet.`
    : `<strong>Tip:</strong> Gå tilbage og læs modulet. Du kan tage quizzen ubegrænsede gange — det er meningen at du skal lykkes.`;
  if (passed) {
    courseState.quizScores[quizState.prog] = quizState.score;
    document.getElementById('btn-quiz-continue').style.display = 'inline-flex';
  }
  document.getElementById('quiz-result').classList.add('show');
}

function restartQuiz() {
  renderQuiz(quizState.prog, quizState.isLight);
}

/* =====================================================================
   RENDERING — EKSAMEN (programs-eksamen)
   ===================================================================== */
let examState = { questions: [], answers: [], submitted: false, prog: '', passScore: 8, isCombined: false };

function renderExam(prog) {
  const questions = DEEP_CONTENT[prog].exam;
  examState = { questions, answers: new Array(questions.length).fill(null), submitted: false, prog, passScore: 8, isCombined: false };
  renderExamUI(`${PROGRAM_LABELS[prog]} eksamen`, `10 spørgsmål · ${examState.passScore} rigtige for at bestå`, '8/10 for at bestå');
}

function renderCombinedExam() {
  examState = { questions: COMBINED_EXAM, answers: new Array(COMBINED_EXAM.length).fill(null), submitted: false, prog: 'combined', passScore: 10, isCombined: true };
  renderExamUI('Samlet eksamen', `${COMBINED_EXAM.length} spørgsmål · ${examState.passScore} rigtige for at bestå`, '10/12 for at bestå');
}

function renderExamUI(title, subtitle, reqLabel) {
  const container = document.getElementById('container');
  const letters = ['A', 'B', 'C', 'D'];
  const questionsHtml = examState.questions.map((q, qi) => `
    <div class="exam-question" id="exq-${qi}">
      <div class="q-number">Spørgsmål ${qi + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="exam-options">
        ${q.options.map((opt, oi) => `
          <div class="exam-option" data-q="${qi}" data-o="${oi}" onclick="examSelect(${qi}, ${oi})">
            <div class="opt-letter">${letters[oi]}</div>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="exam-explanation" id="exp-${qi}"></div>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="state active">
      <div class="exam-intro">
        <h2>${title}</h2>
        <p>${subtitle}</p>
        <p>Læs hvert spørgsmål omhyggeligt og vælg det bedste svar. Når du har svaret på alle spørgsmål, klikker du indlevér nederst på siden.</p>
        <div class="req-row">
          <span class="exam-req-pill">⚠ ${reqLabel}</span>
          <span class="exam-req-pill">Ingen tidsbegrænsning</span>
          <span class="exam-req-pill">Ubegrænsede forsøg</span>
        </div>
      </div>
      ${questionsHtml}
      <div class="exam-submit-bar">
        <span class="exam-progress-text" id="exam-progress-text">0 af ${examState.questions.length} besvaret</span>
        <button class="btn btn-primary" id="exam-submit" disabled onclick="submitExam()">Indlevér eksamen</button>
      </div>
      <div class="exam-result-card" id="exam-result-card">
        <div class="result-icon" id="exam-result-icon"></div>
        <h2 class="result-title" id="exam-result-title"></h2>
        <p class="result-sub" id="exam-result-sub"></p>
        <div class="score-badge" id="exam-score-badge"></div>
        <div class="result-message" id="exam-result-message"></div>
        <div class="result-btn-row">
          <button class="btn-retry" id="exam-retry" onclick="retryExam()">↺ Prøv igen</button>
          <button class="btn btn-success" id="exam-continue" style="display:none;" onclick="nextState()">Fortsæt →</button>
        </div>
      </div>
    </div>
  `;
  window.scrollTo(0, 0);
}

function examSelect(qi, oi) {
  if (examState.submitted) return;
  examState.answers[qi] = oi;
  const opts = document.querySelectorAll(`.exam-option[data-q="${qi}"]`);
  opts.forEach(o => o.classList.remove('selected'));
  document.querySelector(`.exam-option[data-q="${qi}"][data-o="${oi}"]`).classList.add('selected');
  const answered = examState.answers.filter(a => a !== null).length;
  document.getElementById('exam-progress-text').textContent = `${answered} af ${examState.questions.length} besvaret`;
  document.getElementById('exam-submit').disabled = answered < examState.questions.length;
}

function submitExam() {
  examState.submitted = true;
  let score = 0;
  examState.questions.forEach((q, qi) => {
    const ans = examState.answers[qi];
    const correct = q.correct;
    const opts = document.querySelectorAll(`.exam-option[data-q="${qi}"]`);
    opts.forEach(o => {
      o.classList.add('locked');
      o.classList.remove('selected');
      const oi = parseInt(o.dataset.o);
      if (oi === correct) o.classList.add('correct');
      else if (oi === ans) o.classList.add('wrong');
    });
    if (ans === correct) score++;
    const exp = document.getElementById(`exp-${qi}`);
    exp.classList.add('show');
    exp.innerHTML = `<strong>${ans === correct ? '✓ Rigtigt' : '✗ Ikke rigtigt'}.</strong> ${q.explanation}`;
  });
  const passed = score >= examState.passScore;
  const card = document.getElementById('exam-result-card');
  card.classList.add('show', passed ? 'passed' : 'failed');
  document.getElementById('exam-result-icon').textContent = passed ? '🏆' : '💪';
  document.getElementById('exam-result-title').textContent = passed ? 'Bestået!' : 'Ikke bestået denne gang';
  document.getElementById('exam-result-sub').textContent = passed
    ? `Du svarede rigtigt på ${score} ud af ${examState.questions.length} spørgsmål.`
    : `Du fik ${score} ud af ${examState.questions.length}. Du skal have mindst ${examState.passScore} for at bestå.`;
  const badge = document.getElementById('exam-score-badge');
  badge.className = `score-badge ${passed ? 'pass' : 'fail'}`;
  badge.textContent = `${score} / ${examState.questions.length} rigtige`;
  document.getElementById('exam-result-message').innerHTML = passed
    ? `<strong>Flot klaret!</strong> Du har demonstreret at du kan anvende stoffet i praksis. Klik fortsæt for at gå videre.`
    : `<strong>Tip:</strong> Læs forklaringerne ved hvert spørgsmål — de viser dig præcis hvor logikken klikkede. Eksamen kan tages ubegrænsede gange.`;
  if (passed) {
    courseState.examScores[examState.prog] = score;
    document.getElementById('exam-continue').style.display = 'inline-flex';
    document.getElementById('exam-retry').style.display = 'none';
  }
  document.getElementById('exam-submit').disabled = true;
  document.getElementById('exam-submit').textContent = 'Eksamen indleveret';
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryExam() {
  if (examState.isCombined) renderCombinedExam();
  else renderExam(examState.prog);
}

/* =====================================================================
   RENDERING — BEVIS
   ===================================================================== */
function renderBevis() {
  const container = document.getElementById('container');
  const programs = courseState.userChoice === 'deep' ? courseState.programOrder : ['excel', 'word', 'ppt', 'slides'];
  const programsHtml = programs.map(p => `<span class="bevis-prog-pill">✓ ${PROGRAM_LABELS[p]}</span>`).join('');
  const dato = new Date().toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
  const programsText = programs.map(p => PROGRAM_LABELS[p]).join(', ');
  container.innerHTML = `
    <div class="state active">
      <div class="bevis-wrap">
        <div class="bevis-card" id="bevis-print">
          <div class="bevis-logo">
            <div class="bevis-logo-icon">
              <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H6Z"/></svg>
            </div>
            <span class="bevis-logo-text">LearnAI DK</span>
          </div>
          <div class="bevis-badge">Sidekursus bevis</div>
          <h1>AI til dokumenter <br><span class="accent">— bestået</span></h1>
          <div class="bevis-programs">${programsHtml}</div>
          <div class="bevis-date">${dato}</div>
          <p class="bevis-text">Du har demonstreret evnen til at bruge AI professionelt i ${programsText} og kan nu spare significante timer i dit daglige arbejde.</p>
          <div class="bevis-actions">
            <button class="btn btn-secondary" onclick="window.print()">🖨 Print bevis</button>
            <a href="platform.html" class="btn btn-success">Tilbage til platformen →</a>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('topbar-fill').style.width = '100%';
  document.getElementById('topbar-pct').textContent = '100%';
  document.getElementById('topbar-label').textContent = 'Forløb gennemført 🎉';
  window.scrollTo(0, 0);
}

   INIT
   ===================================================================== */
renderIntro();
</script>
